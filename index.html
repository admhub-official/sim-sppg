<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1e6f9c">
  <title>SIM-SPPG</title>
  <style>
    html,body{height:100%;margin:0;font-family:Arial,sans-serif;background:#f0f4f8;color:#334155}
    .boot{height:100%;display:grid;place-items:center;text-align:center;padding:24px;box-sizing:border-box}
    .spinner{width:34px;height:34px;border:4px solid #cbd5e1;border-top-color:#1e6f9c;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .error{max-width:560px;background:#fff;border:1px solid #fecaca;border-radius:14px;padding:22px;box-shadow:0 10px 30px rgba(15,23,42,.08)}
    button{border:0;border-radius:8px;background:#1e6f9c;color:#fff;padding:10px 16px;font-weight:700;cursor:pointer}
  </style>
</head>
<body>
  <main id="boot" class="boot" aria-live="polite">
    <div><div class="spinner"></div><strong>Memuat SIM-SPPG…</strong></div>
  </main>
  <script>
  (function () {
    'use strict';

    function normalize(source) {
      var html = source;
      html = html.replace('<base target="_top">', '<base href="./" target="_top">');
      html = html.replace('<link rel="manifest" href="/manifest.json">', '<link rel="manifest" href="manifest.json">');
      html = html.replace("navigator.serviceWorker.register('/sw.js')", "navigator.serviceWorker.register(new URL('sw.js', document.baseURI).href, { scope: './' })");

      var chartTag = '<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"><\/script>';
      var configTag = '<script src="supabase-config.js"><\/script>';
      if (html.indexOf(configTag) === -1 && html.indexOf(chartTag) !== -1) {
        html = html.replace(chartTag, configTag + '\n  ' + chartTag);
      }

      var notificationTag = '<script src="notification-enhancement.js?v=5" defer><\/script>';
      if (html.indexOf('notification-enhancement.js') === -1) {
        html = html.replace(/<\/body>/i, '  ' + notificationTag + '\n</body>');
      }

      var duplicate = "  if (jabatan) updateData['JABATAN'] = jabatan;\n  if (sppg)    updateData['SPPG'] = sppg;\n  updateData['NAMA YAYASAN'] = yayasan;\n  if (jabatan) updateData['JABATAN'] = jabatan;\n  if (sppg) updateData['SPPG'] = sppg;\n  updateData['NAMA YAYASAN'] = yayasan;";
      var deduped = "  if (jabatan) updateData['JABATAN'] = jabatan;\n  if (sppg) updateData['SPPG'] = sppg;\n  updateData['NAMA YAYASAN'] = yayasan;";
      html = html.replace(duplicate, deduped);
      return html;
    }

    fetch('app-source.html', { cache: 'no-cache' })
      .then(function (response) {
        if (!response.ok) throw new Error('HTTP ' + response.status);
        return response.text();
      })
      .then(function (source) {
        var patched = normalize(source);
        document.open();
        document.write(patched);
        document.close();
      })
      .catch(function (error) {
        document.getElementById('boot').innerHTML = '<div class="error"><h2>Aplikasi gagal dimuat</h2><p>File sumber SIM-SPPG tidak dapat dibuka. Periksa koneksi lalu muat ulang halaman.</p><p><small>' + String(error.message || error) + '</small></p><button onclick="location.reload()">Muat Ulang</button></div>';
      });
  })();
  </script>
</body>
</html>
