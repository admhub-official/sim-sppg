<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>SIM-SPPG</title>
  <style>html,body{height:100%;margin:0;font-family:Arial,sans-serif;background:#eef4f8}.boot{height:100%;display:flex;align-items:center;justify-content:center;color:#1e6f9c}.boot div{text-align:center}.spin{width:34px;height:34px;border:4px solid #dbeafe;border-top-color:#1e6f9c;border-radius:50%;margin:0 auto 12px;animation:s .8s linear infinite}@keyframes s{to{transform:rotate(360deg)}}</style>
</head>
<body>
  <div class="boot"><div><div class="spin"></div><strong>Memuat SIM-SPPG…</strong></div></div>
  <script>
  (async function(){
    try {
      var response = await fetch('app-source.html?v=11', { cache: 'no-store' });
      if (!response.ok) throw new Error('HTTP ' + response.status);
      var html = await response.text();
      html = html
        .replace(/[\u0000-\u0008\u000B\u000C\u000E-\u001F\u007F\u2028\u2029\u200B\u200C\u200D\u2060\uFEFF]/g, '')
        .replace(/[\u2018\u2019]/g, "'")
        .replace(/[\u201C\u201D]/g, '"')
        .replace('<base target="_top">', '<base href="./" target="_top">')
        .replace(/<base\s+target=["']_blank["']\s*\/?>/i, '')
        .replace('href="/manifest.json"', 'href="manifest.json"')
        .replace("navigator.serviceWorker.register('/sw.js')", "navigator.serviceWorker.register(new URL('sw.js', document.baseURI).href, { scope: './' })");
      if (!/src=["']app\.js/i.test(html)) html = html.replace(/<\/body>/i, '<script src="app.js?v=11"><\\/script></body>');
      document.open();
      document.write(html);
      document.close();
    } catch (error) {
      document.body.innerHTML = '<div class="boot"><div><strong>Gagal memuat aplikasi</strong><p>' + String(error.message || error) + '</p><button onclick="location.reload()">Muat ulang</button></div></div>';
    }
  })();
  </script>
</body>
</html>
