<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SIM-SPPG Supabase Health Check</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 720px; margin: 48px auto; padding: 0 20px; color: #1e293b; }
    .card { border: 1px solid #cbd5e1; border-radius: 14px; padding: 24px; box-shadow: 0 8px 24px rgba(15, 23, 42, .08); }
    .status { font-weight: 700; margin: 12px 0; }
    pre { background: #f8fafc; border-radius: 10px; padding: 14px; overflow: auto; white-space: pre-wrap; }
    button { border: 0; border-radius: 9px; padding: 10px 16px; cursor: pointer; font-weight: 700; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Supabase Health Check</h1>
    <p>Memeriksa koneksi frontend SIM-SPPG ke Edge Function Supabase.</p>
    <button id="checkBtn" type="button">Periksa koneksi</button>
    <div id="status" class="status">Belum diperiksa.</div>
    <pre id="result">-</pre>
  </main>

  <script src="./supabase-config.js"></script>
  <script>
    (function () {
      var button = document.getElementById('checkBtn');
      var status = document.getElementById('status');
      var result = document.getElementById('result');

      async function runCheck() {
        button.disabled = true;
        status.textContent = 'Memeriksa...';
        result.textContent = '-';

        try {
          var data = await window.SIM_SPPG_SUPABASE.healthCheck();
          status.textContent = 'Terhubung';
          result.textContent = JSON.stringify(data, null, 2);
        } catch (error) {
          status.textContent = 'Gagal terhubung';
          result.textContent = error && error.message ? error.message : String(error);
        } finally {
          button.disabled = false;
        }
      }

      button.addEventListener('click', runCheck);
      runCheck();
    })();
  </script>
</body>
</html>
