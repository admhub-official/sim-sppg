name: Route profile actions securely once

on:
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'agent/apply-audit-fixes-20260715' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: python tools/route_secure_profile_actions.py
      - name: Validate
        run: |
          node --check app.js
          grep -q "SECURE_USER_FN_URL" app.js
          grep -q "fetch(requestUrl" app.js
      - name: Commit production file only
        run: |
          rm -f .github/workflows/route-secure-profile-once.yml
          rm -f tools/route_secure_profile_actions.py
          rmdir tools 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: route profile updates through secure endpoint"
          git push origin HEAD:${{ github.head_ref }}
