name: Cleanup legacy Approval UI

on:
  push:
    branches:
      - fix/approval-responsive-ui-cleanup
    paths:
      - 'scripts/cleanup-legacy-approval-ui.py'
      - '.github/workflows/cleanup-legacy-approval-ui.yml'

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/approval-responsive-ui-cleanup
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Remove retired Approval UI code
        run: python scripts/cleanup-legacy-approval-ui.py
      - name: Commit cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html sw.js scripts/check-approval-row-detail.mjs scripts/check-verifier-flow-regression.mjs
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "refactor: remove legacy Approval mobile UI"
            git push origin HEAD:fix/approval-responsive-ui-cleanup
          fi
