name: Diagnose visible code comments

on:
  push:
    branches:
      - agent/fix-visible-comments
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-visible-comments

      - name: Normalize comments outside code blocks
        run: |
          cp index.html /tmp/index-before.html
          python3 - <<'PY'
          from pathlib import Path
          import re
          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          block_re = re.compile(r'(<(?:script|style)\b[^>]*>.*?</(?:script|style)\s*>)', re.I | re.S)
          parts = block_re.split(text)
          repaired = []
          converted = 0
          for part in parts:
              lower = part.lstrip().lower()
              if lower.startswith('<script') or lower.startswith('<style'):
                  repaired.append(part)
              else:
                  new, count = re.subn(r'/\*(.*?)\*/', lambda m: '<!--' + m.group(1) + '-->', part, flags=re.S)
                  converted += count
                  repaired.append(new)
          path.write_text(''.join(repaired), encoding='utf-8')
          print(f'Converted visible comments: {converted}')
          PY

      - name: Verify code blocks unchanged and write audit
        run: |
          python3 - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          import re, hashlib

          before = Path('/tmp/index-before.html').read_text(encoding='utf-8')
          after = Path('index.html').read_text(encoding='utf-8')
          block_re = re.compile(r'<(?:script|style)\b[^>]*>.*?</(?:script|style)\s*>', re.I | re.S)
          before_blocks = block_re.findall(before)
          after_blocks = block_re.findall(after)
          if before_blocks != after_blocks:
              raise SystemExit('Blok kode berubah.')

          class Audit(HTMLParser):
              def __init__(self):
                  super().__init__(convert_charrefs=True)
                  self.code_depth = 0
                  self.bad = []
              def handle_starttag(self, tag, attrs):
                  if tag.lower() in ('script','style'):
                      self.code_depth += 1
              def handle_endtag(self, tag):
                  if tag.lower() in ('script','style') and self.code_depth:
                      self.code_depth -= 1
              def handle_data(self, data):
                  if self.code_depth:
                      return
                  compact = ' '.join(data.split())
                  if compact and ('/*' in compact or '*/' in compact):
                      self.bad.append(compact)

          audit = Audit()
          audit.feed(after)
          report = [f'code_blocks={len(after_blocks)}', f'sha256={hashlib.sha256("".join(after_blocks).encode()).hexdigest()}', f'bad_count={len(audit.bad)}']
          for i, item in enumerate(audit.bad, 1):
              report.append(f'[{i}] {item[:1000]}')
          Path('visible-comment-audit.log').write_text('\n'.join(report) + '\n', encoding='utf-8')
          PY

      - name: Commit diagnostic result
        run: |
          rm -f .github/workflows/fix-visible-comments.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Diagnosa komentar yang masih tampil"
          git push
