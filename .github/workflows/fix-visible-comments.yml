name: Fix visible code comments

on:
  push:
    branches:
      - agent/fix-visible-comments
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-visible-comments

      - name: Normalize only comments outside code blocks
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          block_re = re.compile(r'(<(?:script|style)\b[^>]*>.*?</(?:script|style)\s*>)', re.I | re.S)
          parts = block_re.split(text)
          repaired = []
          converted = 0

          for part in parts:
              lower = part.lstrip().lower()
              if lower.startswith('<script') or lower.startswith('<style'):
                  repaired.append(part)
              else:
                  new, count = re.subn(r'/\*(.*?)\*/', lambda m: '<!--' + m.group(1) + '-->', part, flags=re.S)
                  converted += count
                  repaired.append(new)

          path.write_text(''.join(repaired), encoding='utf-8')
          print(f'Converted visible code comments: {converted}')
          if converted == 0:
              raise SystemExit('Tidak ditemukan komentar kode visual untuk diperbaiki.')
          PY

      - name: Validate JavaScript syntax
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          html = Path('index.html').read_text(encoding='utf-8')
          scripts = re.findall(r'<script(?![^>]*\bsrc=)[^>]*>(.*?)</script\s*>', html, flags=re.I|re.S)
          if not scripts:
              raise SystemExit('Inline JavaScript tidak ditemukan.')
          for i, script in enumerate(scripts, 1):
              Path(f'/tmp/inline-{i}.js').write_text(script, encoding='utf-8')
          print(f'Inline scripts: {len(scripts)}')
          PY
          for file in /tmp/inline-*.js; do node --check "$file"; done

      - name: Validate no comments render as text
        run: |
          python3 - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          import re

          html = Path('index.html').read_text(encoding='utf-8')

          class Audit(HTMLParser):
              def __init__(self):
                  super().__init__(convert_charrefs=True)
                  self.code_depth = 0
                  self.bad = []
              def handle_starttag(self, tag, attrs):
                  if tag.lower() in ('script', 'style'):
                      self.code_depth += 1
              def handle_endtag(self, tag):
                  if tag.lower() in ('script', 'style') and self.code_depth:
                      self.code_depth -= 1
              def handle_data(self, data):
                  if self.code_depth:
                      return
                  compact = ' '.join(data.split())
                  if not compact:
                      return
                  if '/*' in compact or '*/' in compact:
                      self.bad.append(compact[:300])
                  if re.search(r'={10,}\s*(INDEX|APP SHELL|AUTH|MAIN|DASHBOARD|PROFILE|SURVEY)', compact, re.I):
                      self.bad.append(compact[:300])

          audit = Audit()
          audit.feed(html)
          if audit.bad:
              raise SystemExit('Teks komentar masih terlihat:\n' + '\n'.join(audit.bad[:20]))

          required = ['function doLogin()', 'onclick="doLogin()"', 'id="dashboardPage"', 'id="appContainer"']
          missing = [value for value in required if value not in html]
          if missing:
              raise SystemExit('Elemen penting hilang: ' + ', '.join(missing))
          print('Visible comment audit passed.')
          PY

      - name: Validate document structure
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          html = Path('index.html').read_text(encoding='utf-8')
          for tag in ('html', 'body', 'style', 'script'):
              opened = len(re.findall(r'<' + tag + r'\b', html, re.I))
              closed = len(re.findall(r'</' + tag + r'\s*>', html, re.I))
              if opened != closed:
                  raise SystemExit(f'Tag {tag} tidak seimbang: {opened}/{closed}')
          if len(re.findall(r'<body\b', html, re.I)) != 1:
              raise SystemExit('Dokumen harus memiliki tepat satu body utama.')
          print('Document structure passed.')
          PY

      - name: Commit clean result
        run: |
          rm -f .github/workflows/fix-visible-comments.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Perbaiki komentar kode yang tampil di halaman"
          git push
