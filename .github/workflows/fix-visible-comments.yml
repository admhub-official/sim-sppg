name: Fix visible code comments

on:
  push:
    branches:
      - agent/fix-visible-comments
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-visible-comments

      - name: Normalize only comments outside code blocks
        run: |
          cp index.html /tmp/index-before.html
          python3 - <<'PY'
          from pathlib import Path
          import re
          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          block_re = re.compile(r'(<(?:script|style)\b[^>]*>.*?</(?:script|style)\s*>)', re.I | re.S)
          parts = block_re.split(text)
          repaired = []
          converted = 0
          for part in parts:
              lower = part.lstrip().lower()
              if lower.startswith('<script') or lower.startswith('<style'):
                  repaired.append(part)
              else:
                  new, count = re.subn(r'/\*(.*?)\*/', lambda m: '<!--' + m.group(1) + '-->', part, flags=re.S)
                  converted += count
                  repaired.append(new)
          path.write_text(''.join(repaired), encoding='utf-8')
          print(f'Converted visible code comments: {converted}')
          if converted == 0:
              raise SystemExit('Tidak ditemukan komentar kode visual untuk diperbaiki.')
          PY

      - name: Validate code block integrity
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re, hashlib
          before = Path('/tmp/index-before.html').read_text(encoding='utf-8')
          after = Path('index.html').read_text(encoding='utf-8')
          block_re = re.compile(r'<(?:script|style)\b[^>]*>.*?</(?:script|style)\s*>', re.I | re.S)
          before_blocks = block_re.findall(before)
          after_blocks = block_re.findall(after)
          if before_blocks != after_blocks:
              raise SystemExit('Isi blok script/style berubah, perbaikan dibatalkan.')
          if 'function doLogin()' not in after or 'onclick="doLogin()"' not in after:
              raise SystemExit('Fungsi atau handler login tidak ditemukan.')
          print(f'Code blocks unchanged: {len(after_blocks)}, sha256={hashlib.sha256("".join(after_blocks).encode()).hexdigest()}')
          PY

      - name: Validate no literal block-comment tokens are visible
        run: |
          python3 - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path

          html = Path('index.html').read_text(encoding='utf-8')
          class Audit(HTMLParser):
              def __init__(self):
                  super().__init__(convert_charrefs=True)
                  self.code_depth = 0
                  self.bad = []
              def handle_starttag(self, tag, attrs):
                  if tag.lower() in ('script', 'style'):
                      self.code_depth += 1
              def handle_endtag(self, tag):
                  if tag.lower() in ('script', 'style') and self.code_depth:
                      self.code_depth -= 1
              def handle_data(self, data):
                  if self.code_depth:
                      return
                  compact = ' '.join(data.split())
                  if compact and ('/*' in compact or '*/' in compact):
                      self.bad.append(compact[:300])
          audit = Audit()
          audit.feed(html)
          if audit.bad:
              raise SystemExit('Token komentar masih tampil sebagai teks:\n' + '\n'.join(audit.bad[:20]))
          print('Visible comment audit passed.')
          PY

      - name: Commit clean result
        run: |
          rm -f .github/workflows/fix-visible-comments.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Perbaiki komentar kode yang tampil di halaman"
          git push
