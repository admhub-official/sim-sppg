name: Run verified SIM-SPPG audit patch

on:
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'agent/apply-audit-fixes-20260715' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Apply patch
        run: python tools/apply_audit_frontend.py
      - name: Validate
        run: |
          node --check app.js
          python - <<'PY'
          import re
          from pathlib import Path
          html = Path('index.html').read_text(encoding='utf-8')
          js = Path('app.js').read_text(encoding='utf-8')
          expected = {'style':(3,3),'script':(5,5),'div':(593,593),'head':(1,1),'body':(1,1),'html':(1,1)}
          for tag, pair in expected.items():
              actual=(len(re.findall(fr'<{tag}\b',html,re.I)),len(re.findall(fr'</{tag}\s*>',html,re.I)))
              assert actual == pair, (tag,actual,pair)
          combined=html+'\n'+js
          for item in ['api.telegram.org','TELEGRAM_BOT_TOKEN','/rest/v1/TRANSAKSI','/rest/v1/riwayat_laporan']:
              assert item.lower() not in combined.lower(), item
          assert not re.search(r'\b\d{8,12}:[A-Za-z0-9_-]{25,}\b',js)
          assert not re.search(r'transition\s*:\s*all\b',html,re.I)
          assert not any(float(v)<10 for v in re.findall(r'font-size\s*:\s*(\d+(?:\.\d+)?)px',combined))
          print('Validated frontend audit patch.')
          PY
      - name: Commit verified production files only
        run: |
          rm -f .github/workflows/apply-audit-frontend-once.yml
          rm -f .github/workflows/pull-request-audit-runner.yml
          rm -f tools/apply_audit_frontend.py
          rmdir tools 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: apply verified frontend audit findings"
          git push origin HEAD:${{ github.head_ref }}
