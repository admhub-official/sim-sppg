name: Apply file access routing
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-file-access-routing.yml'
      - 'scripts/apply-file-access-routing.py'
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - run: python scripts/apply-file-access-routing.py
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add app.js
          git diff --cached --quiet && exit 0
          git commit -m "feat: route file access to hardened backend"
          git push
