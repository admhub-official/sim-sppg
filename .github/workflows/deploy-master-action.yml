name: Deploy master-action

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/master-action/**'
      - '.github/workflows/deploy-master-action.yml'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: dmjsgtichrfxhyywstrt
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Validate source
        run: |
          set -euo pipefail
          test -s supabase/functions/master-action/index.ts
          grep -q "ADMIN_ASSIGNMENT" supabase/functions/master-action/core.ts
          grep -q "10 MB" supabase/functions/master-action/core.ts
      - name: Deploy
        run: |
          set -euo pipefail
          supabase functions deploy master-action --project-ref "$SUPABASE_PROJECT_REF" --use-api --debug
      - name: Verify
        run: supabase functions list --project-ref "$SUPABASE_PROJECT_REF"