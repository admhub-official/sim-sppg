name: Apply stable user detail key

on:
  push:
    branches:
      - fix/user-detail-stable-key
    paths:
      - 'scripts/apply-user-detail-stable-key.py'
      - '.github/workflows/apply-user-detail-stable-key.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/user-detail-stable-key
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply stable user detail key patch
        run: python scripts/apply-user-detail-stable-key.py
      - name: Commit generated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.js index.html sw.js scripts/check-user-management-row-detail.mjs scripts/check-verifier-flow-regression.mjs
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "fix: resolve user details with stable keys"
            git push origin HEAD:fix/user-detail-stable-key
          fi
