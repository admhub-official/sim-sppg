name: Disable legacy approval handlers
on:
  pull_request:
    branches: [main]
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/disable-legacy-approval-handlers-20260720
          fetch-depth: 0
      - run: |
          python scripts/patch-disable-legacy-approval.py
          grep -Fq 'getTransactionDetail' supabase/functions/transaction-action/index.ts
          ! grep -Fq 'approveTransaction:(p:any[],c:Caller)' supabase/functions/transaction-action/index.ts
          ! grep -Fq 'submitUserBuktiPembayaran:(p:any[],c:Caller)' supabase/functions/transaction-action/index.ts
          ! grep -Fq 'verifyUserPayment:(p:any[],c:Caller)' supabase/functions/transaction-action/index.ts
      - run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add supabase/functions/transaction-action/index.ts
          git commit -m 'fix: disable legacy approval handlers'
          git push origin HEAD:fix/disable-legacy-approval-handlers-20260720
