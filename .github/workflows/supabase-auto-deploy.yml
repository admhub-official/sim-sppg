name: Supabase Auto Deploy
on:
  push:
    branches: [main]
    paths: ['supabase/functions/**']
permissions:
  contents: read
concurrency:
  group: supabase-production-deploy
  cancel-in-progress: false
jobs:
  deploy-functions:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy changed functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SUPABASE_ACCESS_TOKEN"
          BEFORE="${{ github.event.before }}"
          [[ -z "$BEFORE" || "$BEFORE" == "0000000000000000000000000000000000000000" ]] && BEFORE="HEAD~1"
          git diff --name-only "$BEFORE" HEAD -- supabase/functions | awk -F/ 'NF >= 3 {print $3}' | sort -u | while read -r FN; do
            [[ -z "$FN" ]] && continue
            case "$FN" in
              dynamic-action|register-user-v2|auth-public-action|account-recovery-action|app-config-action|push-public-action)
                supabase functions deploy "$FN" --project-ref dmjsgtichrfxhyywstrt --no-verify-jwt ;;
              *)
                supabase functions deploy "$FN" --project-ref dmjsgtichrfxhyywstrt ;;
            esac
          done
