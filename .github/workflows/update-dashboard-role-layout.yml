name: Update dashboard role layout

on:
  push:
    branches:
      - agent/dashboard-role-quick-access
    paths:
      - .github/workflows/update-dashboard-role-layout.yml

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/dashboard-role-quick-access

      - name: Update dashboard layout and role visibility
        shell: python
        run: |
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          old_panel = '<section class="dash-panel"><div class="dash-head"><div class="dash-title"><div class="dash-icon"><i class="fas fa-building"></i>'
          new_panel = '<section id="dashSppgPanel" class="dash-panel"><div class="dash-head"><div class="dash-title"><div class="dash-icon"><i class="fas fa-building"></i>'
          if old_panel not in text:
              raise SystemExit('Panel Pengeluaran per SPPG tidak ditemukan')
          text = text.replace(old_panel, new_panel, 1)

          old_identity = "function identity(){var u=window.currentUser||{},h=new Date().getHours(),g=h<11?'Selamat pagi':h<15?'Selamat siang':h<19?'Selamat sore':'Selamat malam';"
          new_identity = "function applyDashboardRoleVisibility(){var u=window.currentUser||{},panel=$('dashSppgPanel'),grid=panel&&panel.parentElement,isAdmin=u.role==='ADMIN'||u.role==='SUPER_ADMIN';if(panel)panel.style.display=isAdmin?'':'none';if(grid)grid.style.gridTemplateColumns=isAdmin?'':'minmax(0,1fr)'}\nfunction identity(){var u=window.currentUser||{},h=new Date().getHours(),g=h<11?'Selamat pagi':h<15?'Selamat siang':h<19?'Selamat sore':'Selamat malam';"
          if old_identity not in text:
              raise SystemExit('Fungsi identity dashboard tidak ditemukan')
          text = text.replace(old_identity, new_identity, 1)

          old_init = "function init(){var page=$('page-dashboard'),stats=$('dashboardStats'),quick=$('quickAccessSection');if(!page||!stats||!quick)return setTimeout(init,300);if($('dashPanels'))return;css();stats.insertAdjacentHTML('beforebegin',hero());quick.insertAdjacentHTML('beforebegin',panels());$('dashPeriod').addEventListener('change',()=>load(true));"
          new_init = "function init(){var page=$('page-dashboard'),stats=$('dashboardStats'),quick=$('quickAccessSection');if(!page||!stats||!quick)return setTimeout(init,300);if($('dashPanels'))return;css();stats.insertAdjacentHTML('beforebegin',hero());page.insertBefore(quick,stats);stats.insertAdjacentHTML('afterend',panels());applyDashboardRoleVisibility();$('dashPeriod').addEventListener('change',()=>load(true));"
          if old_init not in text:
              raise SystemExit('Fungsi init dashboard tidak ditemukan')
          text = text.replace(old_init, new_init, 1)

          if text.count('id="dashSppgPanel"') != 1:
              raise SystemExit('ID dashSppgPanel tidak tepat')
          if "page.insertBefore(quick,stats)" not in text:
              raise SystemExit('Akses Cepat belum dipindahkan')
          if "applyDashboardRoleVisibility();" not in text:
              raise SystemExit('Kontrol role dashboard belum aktif')

          path.write_text(text, encoding='utf-8')

      - name: Validate frontend integrity
        shell: bash
        run: |
          ! grep -q 'dashboard-ui-v2.js' index.html
          ! grep -q 'dashboard-ui-fix.js' index.html
          test "$(grep -o '<script' index.html | wc -l)" = "$(grep -o '</script>' index.html | wc -l)"
          grep -q 'id="dashSppgPanel"' index.html
          grep -q 'page.insertBefore(quick,stats)' index.html

      - name: Commit changes and remove workflow
        shell: bash
        run: |
          rm .github/workflows/update-dashboard-role-layout.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/update-dashboard-role-layout.yml
          git commit -m "Adjust dashboard for user roles and quick access"
          git push
