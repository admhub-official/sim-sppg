name: Apply user cleanup

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/secure-user-action/**'
      - 'scripts/apply-user-cleanup.py'
      - '.github/workflows/apply-user-cleanup.yml'

permissions:
  contents: write

jobs:
  patch-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: dmjsgtichrfxhyywstrt
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Apply operations cleanup patch
        run: python scripts/apply-user-cleanup.py
      - name: Validate cleanup guards
        run: |
          grep -Fq "profilePhotoDeleted" supabase/functions/operations-action/index.ts
          grep -Fq "PUSH_SUBSCRIPTIONS" supabase/functions/operations-action/index.ts
          grep -Fq "removeProfile(oldPhoto)" supabase/functions/secure-user-action/index.ts
          grep -Fq "removeProfile(path)" supabase/functions/secure-user-action/index.ts
      - name: Deploy secure user action
        run: supabase functions deploy secure-user-action --project-ref "$SUPABASE_PROJECT_REF"
      - name: Deploy operations action
        run: supabase functions deploy operations-action --project-ref "$SUPABASE_PROJECT_REF"
      - name: Commit patched operations source
        continue-on-error: true
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add supabase/functions/operations-action/index.ts
          if git diff --cached --quiet; then
            echo "Operations source already patched."
          else
            git commit -m "Clean up profile files when deleting users"
            git push
          fi
      - name: List functions
        run: supabase functions list --project-ref "$SUPABASE_PROJECT_REF"
      # Trigger marker: user cleanup v1
