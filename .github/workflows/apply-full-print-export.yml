name: Apply full print export

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/apply-full-print-export.py'
      - '.github/workflows/apply-full-print-export.yml'

concurrency:
  group: frontend-pagination-patches
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Apply full export patch
        run: python -u scripts/apply-full-print-export.py
      - name: Validate source
        run: |
          node --check app.js
          grep -Fq 'function preparePrintDataset(done)' app.js
          grep -Fq 'function printData(defaultRows)' app.js
          grep -Fq 'function exportMenuRows(rows)' app.js
          grep -Fq '_printDatasetOverride' app.js
      - name: Commit source
        run: |
          if git diff --quiet -- app.js; then echo 'No changes'; exit 0; fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add app.js
          git commit -m 'feat: export and print complete datasets'
          git push
