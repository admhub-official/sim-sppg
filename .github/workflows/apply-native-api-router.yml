name: Apply native API router

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/patch-native-api-router.py'
      - '.github/workflows/apply-native-api-router.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Patch app.js
        run: python scripts/patch-native-api-router.py
      - name: Validate JavaScript and deny legacy route
        run: |
          node --check app.js
          grep -q "auth-public-action" app.js
          grep -q "geocode-action" app.js
          ! grep -q "functions/v1/dynamic-action" app.js
          ! grep -q "SUPABASE_FN_URL" app.js
      - name: Commit patched bundle
        run: |
          if git diff --quiet -- app.js; then
            echo 'No changes required.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add app.js
          git commit -m 'Integrate explicit API router into app bundle'
          git push
