name: Apply transaction orphan cleanup

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/apply-transaction-orphan-cleanup.py'
      - '.github/workflows/apply-transaction-orphan-cleanup.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply transaction cleanup patch
        run: python scripts/apply-transaction-orphan-cleanup.py
      - name: Validate patched source
        run: |
          grep -q "function ownedUpload" supabase/functions/transaction-action/index.ts
          grep -q "cleanup add orphan" supabase/functions/transaction-action/index.ts
          grep -q "cleanup edit orphan" supabase/functions/transaction-action/index.ts
      - name: Commit source change
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add supabase/functions/transaction-action/index.ts
          git diff --cached --quiet && exit 0
          git commit -m "feat: clean orphan and replaced transaction files"
          git push
