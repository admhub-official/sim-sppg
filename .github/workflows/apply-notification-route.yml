name: Apply notification route

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/apply-notification-route.py'
      - '.github/workflows/apply-notification-route.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - run: python scripts/apply-notification-route.py
      - run: |
          node --check app.js
          grep -Fq "'notification-dispatch-action': { dispatchNotification:1 }" app.js
      - name: Commit changes
        run: |
          if git diff --quiet -- app.js; then
            echo 'No app.js change required.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add app.js
          git commit -m 'Route notification dispatch through modular endpoint'
          git push
