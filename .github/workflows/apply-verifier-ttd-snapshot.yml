name: Apply verifier TTD snapshot patch

on:
  push:
    branches: [fix/verifier-ttd-snapshot]
    paths:
      - 'scripts/patch-verifier-ttd-snapshot.py'
      - '.github/workflows/apply-verifier-ttd-snapshot.yml'

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/verifier-ttd-snapshot
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: python scripts/patch-verifier-ttd-snapshot.py
      - name: Validate generated frontend
        run: |
          grep -q "var verifTtdBase64Temp = '';" app.js
          grep -q "var ttdBase64 = verifTtdBase64Temp || '';" app.js
          grep -q "Snapshot tanda tangan verifikator tidak tersedia" app.js
          grep -q "20260721-verifier-ttd-v3" index.html
      - name: Commit generated patch
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add app.js index.html
          git diff --cached --quiet && exit 0
          git commit -m "fix: preserve verifier signature through nominal confirmation"
          git push origin HEAD:fix/verifier-ttd-snapshot
