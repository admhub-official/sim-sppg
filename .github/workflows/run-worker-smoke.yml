name: Run Worker injection smoke test

on:
  push:
    branches:
      - fix/login-syntax-error
    paths:
      - .github/workflows/run-worker-smoke.yml

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/login-syntax-error
      - name: Run smoke test
        shell: bash
        run: |
          node tests/worker-injection.smoke.js | tee worker-smoke-result.txt
      - name: Commit result
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add worker-smoke-result.txt
          git commit -m "chore: record Worker smoke test result" || exit 0
          git push origin HEAD:fix/login-syntax-error
