name: Apply full export and print

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/apply-full-export-print.py'
      - '.github/workflows/apply-full-export-print.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply full dataset export patch
        run: python scripts/apply-full-export-print.py
      - name: Validate bundle
        run: |
          node --check app.js
          grep -Fq 'FULL_DATASET_EXPORT_PRINT_V1' app.js
          grep -Fq 'exportCurrentFilteredCSV' app.js
          grep -Fq 'printCurrentFilteredData' app.js
          grep -Fq "pageKey()==='laporan'" app.js
          grep -Fq "while(hasMore&&page<100)" app.js
      - name: Commit patched app
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add app.js
          if git diff --cached --quiet; then
            echo 'Full export/print already applied.'
          else
            git commit -m 'Export and print full filtered datasets'
            git push
          fi
