name: Apply Approval canonical source

on:
  push:
    branches:
      - fix/approval-canonical-source-loader
    paths:
      - 'scripts/apply-approval-canonical-source.py'
      - '.github/workflows/apply-approval-canonical-source.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/approval-canonical-source-loader
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply canonical loader patch
        run: python scripts/apply-approval-canonical-source.py
      - name: Validate syntax and regressions
        run: |
          node --check app.js
          node --check _worker.js
          node --check sw.js
          node scripts/check-approval-row-detail.mjs
          node scripts/check-verifier-flow-regression.mjs
      - name: Commit canonical source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.js _worker.js sw.js scripts/check-approval-row-detail.mjs scripts/check-verifier-flow-regression.mjs
          if git diff --cached --quiet; then
            echo "No generated changes"
          else
            git commit -m "fix: canonicalize Approval loader in app source"
            git push origin HEAD:fix/approval-canonical-source-loader
          fi
