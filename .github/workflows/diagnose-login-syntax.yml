name: Diagnose login syntax

on:
  push:
    branches:
      - agent/diagnose-login-syntax

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/diagnose-login-syntax

      - name: Extract browser-visible inline scripts and diagnose syntax
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re, subprocess

          html = Path('index.html').read_text(encoding='utf-8')
          pattern = re.compile(r'<script(?![^>]*\bsrc=)[^>]*>(.*?)</script\s*>', re.I | re.S)
          scripts = pattern.findall(html)
          report = [f'inline_scripts={len(scripts)}']

          for idx, script in enumerate(scripts, 1):
              js_path = Path(f'/tmp/inline-{idx}.js')
              js_path.write_text(script, encoding='utf-8')
              proc = subprocess.run(['node', '--check', str(js_path)], text=True, capture_output=True)
              report.append(f'\n===== inline-{idx} exit={proc.returncode} lines={script.count(chr(10))+1} =====')
              if proc.stdout:
                  report.append(proc.stdout)
              if proc.stderr:
                  report.append(proc.stderr)
              if proc.returncode:
                  m = re.search(r':(\d+)\s*$', proc.stderr.splitlines()[0] if proc.stderr.splitlines() else '')
                  if not m:
                      m = re.search(r'inline-\d+\.js:(\d+)', proc.stderr)
                  if m:
                      line_no = int(m.group(1))
                      lines = script.splitlines()
                      start = max(1, line_no - 15)
                      end = min(len(lines), line_no + 15)
                      report.append(f'--- context {start}-{end} ---')
                      for n in range(start, end + 1):
                          report.append(f'{n:05d}: {lines[n-1]}')

          Path('login-syntax-diagnostic.log').write_text('\n'.join(report) + '\n', encoding='utf-8')
          PY

      - name: Commit diagnostic only
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add login-syntax-diagnostic.log
          git commit -m "Catat lokasi pasti syntax error login"
          git push
