name: Diagnose deployed SIM-SPPG HTML

on:
  push:
    branches:
      - fix/login-syntax-error
    paths:
      - .github/workflows/diagnose-deployed-html.yml

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/login-syntax-error

      - name: Download deployed page without cache
        shell: bash
        run: |
          set -e
          curl -fsSL --retry 3 \
            -H 'Cache-Control: no-cache' \
            -H 'Pragma: no-cache' \
            "https://sim-sppg.pages.dev/?page=transaksi&diagnostic=${GITHUB_SHA}" \
            -o /tmp/deployed.html
          wc -c /tmp/deployed.html

      - name: Check deployed inline scripts
        shell: bash
        run: |
          set +e
          python3 <<'PY'
          from pathlib import Path
          import re, subprocess, hashlib

          html = Path('/tmp/deployed.html').read_text(encoding='utf-8', errors='replace')
          lines = html.splitlines()
          report = [
              f'bytes: {len(html.encode("utf-8"))}',
              f'lines: {len(lines)}',
              f'sha256: {hashlib.sha256(html.encode("utf-8")).hexdigest()}',
          ]

          for target in (9898, 9899, 9900, 9901, 9902, 9903, 9904, 9905, 9906, 9907, 9908, 9909, 9910, 9911, 9912):
              if 1 <= target <= len(lines):
                  report.append(f'{target:>6}: {lines[target-1]!r}')

          pattern = re.compile(r'<script\b([^>]*)>(.*?)</script\s*>', re.I | re.S)
          matches = list(pattern.finditer(html))
          report.append(f'\nscript tags found: {len(matches)}')
          failures = 0

          for idx, match in enumerate(matches, 1):
              attrs = match.group(1) or ''
              body = match.group(2)
              html_start_line = html.count('\n', 0, match.start(2)) + 1
              if re.search(r'\bsrc\s*=', attrs, re.I):
                  report.append(f'script {idx}: external, start line {html_start_line}, attrs={attrs.strip()!r}')
                  continue

              js_path = Path(f'/tmp/deployed-inline-{idx}.js')
              js_path.write_text(body, encoding='utf-8')
              proc = subprocess.run(['node', '--check', str(js_path)], text=True, capture_output=True)
              if proc.returncode == 0:
                  report.append(f'script {idx}: OK (HTML starts line {html_start_line}, {body.count(chr(10))+1} lines)')
                  continue

              failures += 1
              output = (proc.stderr or proc.stdout or '').strip()
              report.append(f'\nscript {idx}: FAILED (HTML starts line {html_start_line})')
              report.append(output)
              m = re.search(rf'{re.escape(str(js_path))}:(\d+)', output)
              if m:
                  js_line = int(m.group(1))
                  html_line = html_start_line + js_line - 1
                  report.append(f'HTML line estimate: {html_line}')
                  lo = max(1, html_line - 12)
                  hi = min(len(lines), html_line + 12)
                  report.append('Context:')
                  for n in range(lo, hi + 1):
                      report.append(f'{n:>6}: {lines[n-1]!r}')

          report.append(f'\nfailures: {failures}')
          Path('diagnostics-deployed-js.txt').write_text('\n'.join(report) + '\n', encoding='utf-8')
          PY

      - name: Commit deployed diagnostic report
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add diagnostics-deployed-js.txt
          git commit -m "chore: record deployed JavaScript diagnostic" || exit 0
          git push origin HEAD:fix/login-syntax-error
