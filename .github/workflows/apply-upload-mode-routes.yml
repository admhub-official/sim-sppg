name: Apply upload mode routes

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/apply-upload-mode-routes.py'
      - '.github/workflows/apply-upload-mode-routes.yml'

permissions:
  contents: write

concurrency:
  group: upload-mode-route-patch
  cancel-in-progress: false

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply route patch
        run: python -u scripts/apply-upload-mode-routes.py
      - name: Validate source
        run: |
          set -euo pipefail
          node --check app.js
          grep -Fq 'async function getUploadBuktiMode(c:Caller)' supabase/functions/operations-action/index.ts
          grep -Fq 'async function setUploadBuktiMode(enabled:boolean,c:Caller)' supabase/functions/operations-action/index.ts
          grep -Fq 'getUploadBuktiMode:1, setUploadBuktiMode:1' app.js
          grep -Fq 'version:5' supabase/functions/operations-action/index.ts
      - name: Commit source
        run: |
          set -euo pipefail
          if git diff --quiet -- app.js supabase/functions/operations-action/index.ts; then
            echo 'Upload mode routes already current.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add app.js supabase/functions/operations-action/index.ts
          git commit -m 'feat: move upload mode settings out of dynamic action'
          git pull --rebase origin main
          git push
