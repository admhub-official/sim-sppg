name: Apply survey and handover frontend pagination

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/apply-survey-handover-frontend-pagination.py'
      - '.github/workflows/apply-survey-handover-frontend-pagination.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply pagination patch
        run: python scripts/apply-survey-handover-frontend-pagination.py
      - name: Validate JavaScript
        run: |
          node --check app.js
          grep -q 'surveiServerPaged' app.js
          grep -q 'stServerPaged' app.js
          grep -q 'getSurveiBahanBaku.*pageSize' app.js
          grep -q 'getSerahTerima.*pageSize' app.js
      - name: Commit source
        run: |
          if git diff --quiet -- app.js; then echo 'No changes'; exit 0; fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add app.js
          git commit -m 'feat: use server pagination for survey and handover'
          git push
