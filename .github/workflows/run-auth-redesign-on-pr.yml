name: Run auth redesign on PR
on:
  pull_request:
    branches: [main]
permissions:
  contents: write
jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/redesign-auth-ui
      - name: Execute embedded patch
        run: |
          awk '/python - <<'"'"'PY'"'"'/{flag=1;next}/^          PY$/{if(flag){exit}}flag{sub(/^          /,"");print}' .github/workflows/apply-auth-redesign.yml > /tmp/patch_auth.py
          python /tmp/patch_auth.py
          python - <<'PY'
          from pathlib import Path
          s=Path('index.html').read_text()
          assert s.count('AUTHENTICATION — CLEAN MODERN UI') == 1
          assert 'AUTHENTICATION — LOGIN, REGISTRATION, AND OTP' not in s
          assert s.count('#authOverlay.auth-architecture.hidden') == 1
          for x in ['loginForm','registerForm','otpForm','btnLogin','btnRegister','btnVerifyOtp','loginUsername','loginPassword','otpCode']:
              assert f'id="{x}"' in s, x
          assert s.count('<style') == s.count('</style>')
          assert s.count('<div') == s.count('</div>')
          PY
          node --check app.js
      - name: Commit redesign
        run: |
          rm -f .github/workflows/apply-auth-redesign.yml .github/workflows/run-auth-redesign-on-pr.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add index.html .github/workflows
          git commit -m "redesign: simplify authentication experience"
          git push origin HEAD:agent/redesign-auth-ui
