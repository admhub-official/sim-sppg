name: Route notification actions

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/route-notification-actions.py'
      - '.github/workflows/route-notification-actions.yml'

permissions:
  contents: write

concurrency:
  group: frontend-pagination-patches
  cancel-in-progress: false

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply route patch
        run: python -u scripts/route-notification-actions.py
      - name: Validate frontend
        run: |
          node --check app.js
          grep -Fq 'markNotificationRead:1' app.js
          grep -Fq 'markAllNotificationsRead:1' app.js
      - name: Commit frontend route
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- app.js; then
            echo 'Frontend routes already current.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add app.js
          git commit -m 'feat: route notification actions to reporting service'
          git push
