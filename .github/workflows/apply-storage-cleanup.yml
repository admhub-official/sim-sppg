name: Apply storage cleanup

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/apply-storage-cleanup.py'
      - '.github/workflows/apply-storage-cleanup.yml'

permissions:
  contents: write

jobs:
  patch-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: dmjsgtichrfxhyywstrt
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Apply cleanup patch
        run: python scripts/apply-storage-cleanup.py
      - name: Validate cleanup guards
        run: |
          grep -Fq "cleanup supplier update orphan" supabase/functions/master-action/supplier.ts
          grep -Fq "cleanup deleted supplier files" supabase/functions/master-action/supplier.ts
          grep -Fq "const STORAGE_FILES:any" supabase/functions/operations-action/index.ts
          grep -Fq "cleanup update orphan" supabase/functions/operations-action/index.ts
          grep -Fq "cleanup deleted record files" supabase/functions/operations-action/index.ts
      - name: Deploy master action
        run: supabase functions deploy master-action --project-ref "$SUPABASE_PROJECT_REF"
      - name: Deploy operations action
        run: supabase functions deploy operations-action --project-ref "$SUPABASE_PROJECT_REF"
      - name: Commit patched sources
        continue-on-error: true
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add supabase/functions/master-action/supplier.ts supabase/functions/operations-action/index.ts
          if git diff --cached --quiet; then
            echo "Sources already patched."
          else
            git commit -m "Harden storage cleanup for supplier and operations"
            git push
          fi
      - name: List functions
        run: supabase functions list --project-ref "$SUPABASE_PROJECT_REF"
