name: Apply operations create routes

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/apply-operations-create-routes.py'
      - '.github/workflows/apply-operations-create-routes.yml'

permissions:
  contents: write

concurrency:
  group: operations-create-route-patch
  cancel-in-progress: false

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply route patch
        run: python -u scripts/apply-operations-create-routes.py
      - name: Validate source
        run: |
          set -euo pipefail
          node --check app.js
          grep -Fq 'async function addPending(' supabase/functions/operations-action/index.ts
          grep -Fq 'async function addSurvei(' supabase/functions/operations-action/index.ts
          grep -Fq 'async function addSerahTerima(' supabase/functions/operations-action/index.ts
          grep -Fq 'async function addMenu(' supabase/functions/operations-action/index.ts
          grep -Fq 'addPendingPayment:1' app.js
          grep -Fq 'addMenuHarian:1' app.js
      - name: Commit source
        run: |
          set -euo pipefail
          if git diff --quiet -- app.js supabase/functions/operations-action/index.ts; then
            echo 'Operations create routes already current.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add app.js supabase/functions/operations-action/index.ts
          git commit -m 'feat: move operational create routes out of dynamic action'
          git push
