name: Run approval gateway patch v2
on:
  pull_request:
    branches: [main]
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/approval-deploy-gateway-20260720
          fetch-depth: 0
      - run: |
          git show ab03a722344e67db007a4cb83e6e16bca10d44e7:supabase/functions/transaction-action/index.ts > supabase/functions/transaction-action/index.ts
          python scripts/apply-approval-gateway-patch.py
          node --check app.js
          node scripts/generate-dynamic-route-inventory.mjs
          grep -Fq 'Unmapped literal API calls: **0**' docs/dynamic-route-inventory.md
      - run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add app.js docs/dynamic-route-inventory.md supabase/functions/transaction-action/index.ts
          git commit -m 'fix: route approval flow through focused gateway'
          git push origin HEAD:fix/approval-deploy-gateway-20260720
