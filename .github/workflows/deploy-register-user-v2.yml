name: Deploy register-user-v2

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/register-user-v2/**'
      - '.github/workflows/deploy-register-user-v2.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Validate registration notification
        run: |
          grep -Fq "mode: 'role'" supabase/functions/register-user-v2/index.ts
          grep -Fq "role: 'SUPER_ADMIN'" supabase/functions/register-user-v2/index.ts
          grep -Fq "async function systemNotify" supabase/functions/register-user-v2/index.ts
      - name: Deploy public registration function
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy register-user-v2 --project-ref dmjsgtichrfxhyywstrt --use-api --no-verify-jwt --yes
