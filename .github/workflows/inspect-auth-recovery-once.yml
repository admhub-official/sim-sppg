name: Inspect auth recovery once
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/auth-recovery-adjustments
          fetch-depth: 0
      - name: Capture recovery implementation
        run: |
          python - <<'PY'
          from pathlib import Path
          text = Path('app.js').read_text(encoding='utf-8')
          out = []
          for name in ['showRecoveryModal','submitRecovery']:
              marker = 'function ' + name + '('
              start = text.find(marker)
              out.append('\n===== ' + name + ' =====\n')
              if start < 0:
                  out.append('NOT FOUND\n')
                  continue
              brace = text.find('{', start)
              depth = 0
              quote = None
              escape = False
              i = brace
              while i < len(text):
                  ch = text[i]
                  if quote:
                      if escape: escape = False
                      elif ch == '\\': escape = True
                      elif ch == quote: quote = None
                  else:
                      if ch in "'\"`": quote = ch
                      elif ch == '{': depth += 1
                      elif ch == '}':
                          depth -= 1
                          if depth == 0:
                              out.append(text[start:i+1] + '\n')
                              break
                  i += 1
          Path('.github/AUTH_RECOVERY_CURRENT.txt').write_text(''.join(out), encoding='utf-8')
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .github/AUTH_RECOVERY_CURRENT.txt
          git commit -m "chore: capture recovery implementation"
          git push origin agent/auth-recovery-adjustments