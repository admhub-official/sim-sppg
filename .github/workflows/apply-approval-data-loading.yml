name: Apply Approval data loading fix

on:
  push:
    branches:
      - fix/approval-data-loading
    paths:
      - 'scripts/apply-approval-data-loading.py'
      - '.github/workflows/apply-approval-data-loading.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/approval-data-loading
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply Approval data loading fix
        run: python scripts/apply-approval-data-loading.py
      - name: Run focused checks
        run: |
          node --check app.js
          node scripts/check-approval-row-detail.mjs
          node scripts/check-verifier-flow-regression.mjs
      - name: Commit generated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.js index.html sw.js supabase/functions/approval-payment-action/read.ts scripts/check-approval-row-detail.mjs scripts/check-verifier-flow-regression.mjs
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "fix: restore Approval data loading"
            git push origin HEAD:fix/approval-data-loading
          fi

# Triggered after workflow registration.
