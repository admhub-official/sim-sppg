name: Temporary SIM-SPPG Audit

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout audited revision
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install audit parsers
        run: |
          npm install --no-save acorn@8.15.0
          python -m pip install --disable-pip-version-check beautifulsoup4==4.13.4 html5lib==1.1
      - name: Run structural and cross-reference audit
        run: python tools/audit_sim_sppg.py
      - name: Upload source snapshot and audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sim-sppg-audit-${{ github.event.pull_request.head.sha }}
          path: audit-artifact/
          if-no-files-found: error
          retention-days: 1
