  .auth-form-panel,
  #authOverlay[data-auth-mode="register"] .auth-form-panel {
    min-height: 0;
    padding: 0 14px calc(28px + env(safe-area-inset-bottom,0px));
    margin-top: -34px;
  }
  .auth-card {
    width: min(100%, 620px) !important;
    padding: 25px 22px 22px;
    border-radius: 16px;
    box-shadow: 0 12px 32px rgba(23,32,51,.11);
  }
