          css_pattern = re.compile(r'/\* ============================================================\n\s*AUTHENTICATION\s*—[^\n]*\n\s*============================================================ \*/.*?(?=/\* ============================================================\n\s*REPORT UI)', re.S)
          index, css_count = css_pattern.subn(css + '\n\n', index, count=1)
          if css_count != 1:
              raise SystemExit(f'Auth CSS replacement count={css_count}')

          html_pattern = re.compile(r'<div id="authOverlay".*?</div><!-- /authOverlay -->', re.S)
          index, html_count = html_pattern.subn(html, index, count=1)
          if html_count != 1:
              raise SystemExit(f'Auth HTML replacement count={html_count}')

          new_enhance = r'''  function enhanceAuthentication() {
    var overlay = byId('authOverlay');
    if (!overlay) return false;
    repairInputs();
    overlay.classList.add('auth-architecture');
    overlay.dataset.architectureReady = '1';

    var yayasan = byId('regYayasan');
    if (yayasan) {
      yayasan.required = true;
      yayasan.setAttribute('aria-required', 'true');
    }

    updateAuthHeading();
    if (!authObserver) {
      authObserver = new MutationObserver(function () {
        window.requestAnimationFrame(function () {
          repairInputs();
          updateAuthHeading();
        });
      });
      authObserver.observe(overlay, { subtree:true, attributes:true, attributeFilter:['class','style','hidden'] });
    }
    return true;
  }
'''
          enhance_pattern = re.compile(r'  function enhanceAuthentication\(\) \{.*?\n  \}\n\n  function installRegistrationRouting', re.S)
          app, enhance_count = enhance_pattern.subn(new_enhance + '\n  function installRegistrationRouting', app, count=1)
          if enhance_count != 1:
              raise SystemExit(f'enhanceAuthentication replacement count={enhance_count}')

          app = app.replace("register: ['Registrasi akun', 'Bangun akses operasional Anda', 'Lengkapi identitas, unit SPPG, dan yayasan secara akurat.']", "register: ['Registrasi akun', 'Buat akun SIM-SPPG', 'Lengkapi data akun dan unit kerja Anda.']")

          # Remove all known obsolete auth presentation hooks.
          obsolete = ['auth-architecture-story','auth-architecture-copy','auth-architecture-metrics','auth-architecture-metric','auth-architecture-foot','auth-architecture-formside','auth-brand-inline','auth-architecture-note']
          for token in obsolete:
              if token in app:
                  raise SystemExit(f'Obsolete auth runtime token remains in app.js: {token}')

          index_path.write_text(index, encoding='utf-8')
          app_path.write_text(app, encoding='utf-8')

          required_ids = ['authOverlay','loginForm','registerForm','otpForm','loginUsername','loginPassword','btnLogin','regNama','regEmail','regJabatan','regSPPG','regYayasan','regUsername','regPassword','regPassword2','btnRegister','otpCode','btnVerifyOtp','otpEmailLabel']
          missing = [x for x in required_ids if f'id="{x}"' not in index]
          if missing:
              raise SystemExit('Missing auth IDs: ' + ', '.join(missing))
          if index.count('AUTHENTICATION — MINIMAL COMPACT UI') != 1:
              raise SystemExit('New auth CSS block is not unique')
          if 'AUTHENTICATION — CLEAN MODERN UI' in index or 'Arsitektur operasional terintegrasi' in index:
              raise SystemExit('Old auth presentation remains')
          if index.count('<style') != index.count('</style>'):
              raise SystemExit('Unbalanced style tags')
          if index.count('<div') != index.count('</div>'):
              raise SystemExit(f'Unbalanced div tags: {index.count("<div")} / {index.count("</div>")}')
          print('Auth visual cleanup completed and validated.')
          PY
          python /tmp/patch_auth.py
      - name: Validate JavaScript
        run: node --check app.js
      - name: Remove temporary workflow files
        run: |
          rm -f .github/workflows/auth-final-cleanup.yml .github/AUTH_FINAL_TRIGGER.txt
      - name: Commit final auth cleanup
        run: |
