name: Apply final auth cleanup
on:
  push:
    branches: [agent/redesign-auth-ui]
permissions:
  contents: write
jobs:
  cleanup:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/redesign-auth-ui
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Replace auth visual layer completely
        run: |
          cat > /tmp/patch_auth.py <<'PY'
          from pathlib import Path
          import re

          index_path = Path('index.html')
          app_path = Path('app.js')
          index = index_path.read_text(encoding='utf-8')
          app = app_path.read_text(encoding='utf-8')

          css = r'''/* ============================================================
   AUTHENTICATION — MINIMAL COMPACT UI
   ============================================================ */
#authOverlay.auth-architecture {
  position: fixed !important;
  inset: 0 !important;
  z-index: 9999 !important;
  display: grid !important;
  grid-template-columns: 300px minmax(0, 1fr) !important;
  min-height: 100dvh;
  overflow: auto !important;
  background: #f5f7fa !important;
  color: #172033;
}
#authOverlay.auth-architecture.hidden { display: none !important; }
.auth-brand-panel {
