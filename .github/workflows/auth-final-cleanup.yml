      </div>

      <div id="registerForm" class="auth-container hidden">
        <div class="form-row">
          <div class="form-group"><label class="form-label" for="regNama">Nama Lengkap <span class="req">*</span></label><input type="text" id="regNama" class="form-input" placeholder="Nama lengkap"></div>
          <div class="form-group"><label class="form-label" for="regEmail">Email <span class="req">*</span></label><input type="email" id="regEmail" class="form-input" placeholder="nama@gmail.com" autocomplete="email"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label" for="regJabatan">Jabatan <span class="req">*</span></label><select id="regJabatan" class="form-input"><option value="">Pilih Jabatan</option><option value="ADMIN">ADMIN</option><option value="PIC">PIC</option><option value="ASISTEN LAPANGAN">ASISTEN LAPANGAN</option><option value="WAKIL ASISTEN LAPANGAN">WAKIL ASISTEN LAPANGAN</option><option value="AKUNTAN">AKUNTAN</option><option value="AHLI GIZI">AHLI GIZI</option></select></div>
