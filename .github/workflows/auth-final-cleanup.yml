  #authOverlay[data-auth-mode="register"] .auth-form-panel { padding-inline: 10px; margin-top: -30px; }
  .auth-card { padding: 21px 17px 19px; border-radius: 14px; }
  .auth-card-brand { margin-bottom: 14px; }
  .auth-card-brand img { width: 31px; height: 31px; }
  .auth-architecture-heading h2 { font-size: 22px; }
  .auth-card .form-input, .auth-card input, .auth-card select { min-height: 45px !important; }
  .auth-card .toggle-password { height: 45px !important; }
  .auth-card #btnLogin, .auth-card #btnRegister, .auth-card #btnVerifyOtp { min-height: 46px !important; }
  .auth-security-note { margin-top: 15px; }
}
'''

          html = r'''<div id="authOverlay" class="auth-architecture" data-auth-mode="login">
  <aside class="auth-brand-panel" aria-label="Tentang SIM-SPPG">
