name: Diagnose index JavaScript syntax

on:
  push:
    branches:
      - fix/login-syntax-error
    paths:
      - .github/workflows/diagnose-index-js.yml

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/login-syntax-error

      - name: Check every inline script
        shell: bash
        run: |
          set +e
          python3 <<'PY'
          from pathlib import Path
          import re, subprocess

          html_path = Path('index.html')
          html = html_path.read_text(encoding='utf-8')
          report = []
          pattern = re.compile(r'<script\b([^>]*)>(.*?)</script\s*>', re.I | re.S)
          matches = list(pattern.finditer(html))
          report.append(f'inline script tags found: {len(matches)}')

          failures = 0
          for idx, match in enumerate(matches, 1):
              attrs = match.group(1) or ''
              body = match.group(2)
              if re.search(r'\bsrc\s*=', attrs, re.I):
                  report.append(f'script {idx}: external, skipped')
                  continue

              html_start_line = html.count('\n', 0, match.start(2)) + 1
              js_path = Path(f'/tmp/index-inline-{idx}.js')
              js_path.write_text(body, encoding='utf-8')
              proc = subprocess.run(
                  ['node', '--check', str(js_path)],
                  text=True,
                  capture_output=True,
              )
              if proc.returncode == 0:
                  report.append(f'script {idx}: OK (HTML starts line {html_start_line}, {body.count(chr(10))+1} lines)')
                  continue

              failures += 1
              output = (proc.stderr or proc.stdout or '').strip()
              report.append(f'\nscript {idx}: FAILED (HTML starts line {html_start_line})')
              report.append(output)

              line_match = re.search(rf'{re.escape(str(js_path))}:(\d+)', output)
              if line_match:
                  js_line = int(line_match.group(1))
                  html_line = html_start_line + js_line - 1
                  report.append(f'HTML line estimate: {html_line}')
                  lines = html.splitlines()
                  lo = max(1, html_line - 8)
                  hi = min(len(lines), html_line + 8)
                  report.append('Context:')
                  for n in range(lo, hi + 1):
                      report.append(f'{n:>6}: {lines[n-1]}')

          report.append(f'\nfailures: {failures}')
          Path('diagnostics-index-js.txt').write_text('\n'.join(report) + '\n', encoding='utf-8')
          PY

      - name: Commit diagnostic report
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add diagnostics-index-js.txt
          git commit -m "chore: record index JavaScript syntax diagnostic" || exit 0
          git push origin HEAD:fix/login-syntax-error
