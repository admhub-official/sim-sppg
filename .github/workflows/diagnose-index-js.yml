name: Diagnose index JavaScript syntax

on:
  push:
    branches:
      - fix/login-syntax-error
    paths:
      - .github/workflows/diagnose-index-js.yml

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/login-syntax-error

      - name: Simulate Cloudflare Worker rewrite
        shell: bash
        run: |
          cp _worker.js /tmp/sim-sppg-worker.mjs
          node --input-type=module <<'NODE'
          import fs from 'node:fs/promises';
          import worker from 'file:///tmp/sim-sppg-worker.mjs';

          const source = await fs.readFile('index.html', 'utf8');
          const env = {
            ASSETS: {
              async fetch() {
                return new Response(source, {
                  status: 200,
                  headers: {
                    'content-type': 'text/html; charset=UTF-8',
                    'content-length': String(Buffer.byteLength(source)),
                    'content-encoding': 'gzip',
                    'etag': 'test-etag'
                  }
                });
              }
            }
          };

          const response = await worker.fetch(new Request('https://example.test/?page=transaksi'), env);
          const rewritten = await response.text();
          await fs.writeFile('/tmp/rewritten-index.html', rewritten);

          const reportScript = '<script src="/laporan-fix.js?v=20260714-3"></script>';
          const sessionScript = '<script src="/session-fix.js?v=20260714-3"></script>';
          const realBody = rewritten.toLowerCase().lastIndexOf('</body>');
          const reportAt = rewritten.indexOf(reportScript);
          const printStringAt = rewritten.indexOf("'</body></html>';");

          const assertions = [
            [rewritten.includes(sessionScript), 'session script missing'],
            [reportAt >= 0, 'report script missing'],
            [realBody >= 0, 'real closing body missing'],
            [reportAt < realBody, 'report script must be before real closing body'],
            [reportAt > printStringAt, 'report script was injected inside print JavaScript string'],
            [response.headers.get('content-length') === null, 'stale content-length retained'],
            [response.headers.get('content-encoding') === null, 'stale content-encoding retained'],
            [response.headers.get('etag') === null, 'stale etag retained']
          ];

          for (const [ok, message] of assertions) {
            if (!ok) throw new Error(message);
          }
          NODE

      - name: Check rewritten inline scripts
        shell: bash
        run: |
          set +e
          python3 <<'PY'
          from pathlib import Path
          import re, subprocess

          html = Path('/tmp/rewritten-index.html').read_text(encoding='utf-8')
          report = []
          pattern = re.compile(r'<script\b([^>]*)>(.*?)</script\s*>', re.I | re.S)
          matches = list(pattern.finditer(html))
          report.append(f'script tags found: {len(matches)}')

          failures = 0
          for idx, match in enumerate(matches, 1):
              attrs = match.group(1) or ''
              body = match.group(2)
              html_start_line = html.count('\n', 0, match.start(2)) + 1
              if re.search(r'\bsrc\s*=', attrs, re.I):
                  report.append(f'script {idx}: external, start line {html_start_line}, attrs={attrs.strip()!r}')
                  continue

              js_path = Path(f'/tmp/rewritten-inline-{idx}.js')
              js_path.write_text(body, encoding='utf-8')
              proc = subprocess.run(['node', '--check', str(js_path)], text=True, capture_output=True)
              if proc.returncode == 0:
                  report.append(f'script {idx}: OK (HTML starts line {html_start_line}, {body.count(chr(10))+1} lines)')
                  continue

              failures += 1
              output = (proc.stderr or proc.stdout or '').strip()
              report.append(f'\nscript {idx}: FAILED (HTML starts line {html_start_line})')
              report.append(output)

          report.append(f'\nfailures: {failures}')
          if failures:
              raise SystemExit('\n'.join(report))
          Path('diagnostics-worker-injection.txt').write_text('\n'.join(report) + '\n', encoding='utf-8')
          PY

      - name: Commit diagnostic report
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add diagnostics-worker-injection.txt
          git commit -m "chore: record Worker injection diagnostic" || exit 0
          git push origin HEAD:fix/login-syntax-error
