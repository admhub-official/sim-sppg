name: Apply clickable user detail UI

on:
  push:
    branches:
      - feat/clickable-user-detail-modal
    paths:
      - 'scripts/apply-clickable-user-detail.py'
      - '.github/workflows/apply-clickable-user-detail.yml'
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'feat/clickable-user-detail-modal' || github.ref_name == 'feat/clickable-user-detail-modal'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/clickable-user-detail-modal
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply user management UI patch
        run: |
          if grep -q "function openUserDetailModal(rowNum)" app.js; then
            echo "Patch already applied"
          else
            python scripts/apply-clickable-user-detail.py
          fi
      - name: Commit generated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.js index.html sw.js scripts/check-verifier-flow-regression.mjs scripts/check-user-management-row-detail.mjs
          if git diff --cached --quiet; then
            echo "No generated changes to commit"
          else
            git commit -m "feat: make user rows open detail modal"
            git push origin HEAD:feat/clickable-user-detail-modal
          fi
