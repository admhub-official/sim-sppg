name: Apply pending and audit frontend pagination

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/apply-pending-audit-frontend-pagination.py'
      - '.github/workflows/apply-pending-audit-frontend-pagination.yml'

permissions:
  contents: write

concurrency:
  group: frontend-pagination-patches
  cancel-in-progress: false

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply pagination patch
        env:
          PYTHONUNBUFFERED: '1'
        run: python scripts/apply-pending-audit-frontend-pagination.py
      - name: Validate JavaScript
        run: |
          node --check app.js
          grep -Fq 'var pendingServerTotal = 0, pendingServerPaged = false;' app.js
          grep -Fq 'var auditServerTotal = 0, auditServerPaged = false, auditFilterTimer = null;' app.js
          grep -Fq "getPendingPayments',[{page:page,pageSize:ITEMS_PER_PAGE}]" app.js
          grep -Fq 'var f={page:page,pageSize:ITEMS_PER_PAGE}' app.js
          grep -Fq 'function goPendingPage(p){if(pendingServerPaged)' app.js
          grep -Fq 'function goAuditLogPage(p){if(auditServerPaged)' app.js
      - name: Commit source
        run: |
          if git diff --quiet -- app.js; then echo 'No changes'; exit 0; fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add app.js
          git commit -m 'feat: use server pagination for pending and audit log'
          git push
