name: Apply Approval transaction loader

on:
  push:
    branches:
      - fix/approval-use-transaction-loader
    paths:
      - 'scripts/apply-approval-transaction-loader.py'
      - '.github/workflows/apply-approval-transaction-loader.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/approval-use-transaction-loader
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply transaction loader adaptation
        run: python scripts/apply-approval-transaction-loader.py
      - name: Validate frontend
        run: |
          node --check app.js
          node --check sw.js
          node --check _worker.js
          node scripts/check-approval-row-detail.mjs
          node scripts/check-verifier-flow-regression.mjs
      - name: Commit adapted loader
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.js index.html sw.js _worker.js scripts/check-approval-row-detail.mjs scripts/check-verifier-flow-regression.mjs
          if git diff --cached --quiet; then
            echo "No generated changes"
          else
            git commit -m "fix: load Approval through Transactions data path"
            git push origin HEAD:fix/approval-use-transaction-loader
          fi
