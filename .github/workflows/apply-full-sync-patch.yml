name: Apply full sync patch

on:
  push:
    branches: [fix/full-sync-20260719]
    paths:
      - 'scripts/apply-full-sync-patch.mjs'
      - '.github/workflows/apply-full-sync-patch.yml'

permissions:
  contents: write

concurrency:
  group: apply-full-sync-patch
  cancel-in-progress: false

jobs:
  patch-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/full-sync-20260719
          fetch-depth: 0

      - name: Apply guarded patch
        run: node scripts/apply-full-sync-patch.mjs

      - name: Validate frontend syntax
        run: |
          node --check app.js
          node --check uiux-fixes.js
          node --check sw.js

      - name: Regenerate API route inventory
        run: node scripts/generate-dynamic-route-inventory.mjs

      - name: Validate synchronization contracts
        shell: bash
        run: |
          set -euo pipefail
          grep -Fq "var authToken = token || window._supabaseKey || '';" app.js
          grep -Fq "if (window._supabaseKey) headers.apikey = window._supabaseKey;" app.js
          test "$(grep -Fc "var btnAddSupplier = $('btnAddSupplier');" app.js)" -eq 1
          grep -Fq 'Unmapped literal API calls: **0**' docs/dynamic-route-inventory.md
          grep -Fq 'Legacy `dynamic-action` fallback: **0**' docs/dynamic-route-inventory.md
          if grep -RInE '^(<<<<<<<|=======|>>>>>>>)' -- app.js docs/dynamic-route-inventory.md; then
            echo 'Unresolved merge marker detected.' >&2
            exit 1
          fi

      - name: Commit patched application
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add app.js docs/dynamic-route-inventory.md
          if git diff --cached --quiet; then
            echo 'Application is already patched.'
          else
            git commit -m 'fix: normalize Supabase authorization and remove duplicate supplier code'
            git push origin HEAD:fix/full-sync-20260719
          fi
