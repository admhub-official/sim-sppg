name: Apply pagination refresh

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/apply-pagination-refresh.py'
      - '.github/workflows/apply-pagination-refresh.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply patch
        run: python scripts/apply-pagination-refresh.py
      - name: Validate pagination contract
        run: |
          node --check app.js
          grep -Fq "var PAGED_MUTATION_REFRESH" app.js
          grep -Fq "schedulePagedMutationRefresh(fnName, result)" app.js
          grep -Fq "function normalizePagedResponse" app.js
          grep -Fq "pageSize: Math.max(1, Number(source.pageSize) || ITEMS_PER_PAGE)" app.js
          grep -Fq "addTransaction:{pages:['txPage','approvalPage']" app.js
          grep -Fq "deleteUser:{pages:['usersPage']" app.js
          grep -Fq "deleteSupplier:{pages:['supplierPage']" app.js
          grep -Fq "deleteMenuMBG:{pages:['menuMBGPage']" app.js
      - name: Commit patched app
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add app.js
          if git diff --cached --quiet; then
            echo "Pagination refresh already applied."
          else
            git commit -m "Standardize pagination refresh after mutations"
            git push
          fi
