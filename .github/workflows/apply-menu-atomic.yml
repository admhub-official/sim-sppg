name: Apply Menu MBG atomic RPC

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/apply-menu-atomic.py'
      - '.github/workflows/apply-menu-atomic.yml'

permissions:
  contents: write

jobs:
  patch-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Apply patch
        run: python scripts/apply-menu-atomic.py
      - name: Validate source
        run: |
          node --check <(sed 's/^import .*//g' supabase/functions/operations-action/index.ts) || true
          grep -Fq "create_menu_harian_atomic" supabase/functions/operations-action/index.ts
          grep -Fq "update_menu_harian_atomic" supabase/functions/operations-action/index.ts
          grep -Fq "updateMenuAtomic" supabase/functions/operations-action/index.ts
      - name: Deploy operations-action
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy operations-action --project-ref dmjsgtichrfxhyywstrt --use-api --verify-jwt
      - name: Commit patched source
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898233+github-actions[bot]@users.noreply.github.com
          git add supabase/functions/operations-action/index.ts
          if git diff --cached --quiet; then echo 'Already applied.'; else git commit -m 'Use atomic RPC for Menu MBG create and update'; git push; fi
