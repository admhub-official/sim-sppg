name: Deploy transaction-action

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/transaction-action/**'
      - '.github/workflows/deploy-transaction-action.yml'

permissions:
  contents: read

concurrency:
  group: deploy-transaction-action-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: dmjsgtichrfxhyywstrt

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required source
        shell: bash
        run: |
          set -euo pipefail
          test -s supabase/functions/transaction-action/index.ts
          grep -q "Deno.serve" supabase/functions/transaction-action/index.ts
          grep -q "requireCompleteDocs" supabase/functions/transaction-action/index.ts
          grep -q "async function removeFiles" supabase/functions/transaction-action/index.ts
          grep -q "submit_transaction_payment_atomic" supabase/functions/transaction-action/index.ts
          grep -q "function ownedUpload" supabase/functions/transaction-action/index.ts
          grep -q "cleanup add orphan" supabase/functions/transaction-action/index.ts
          grep -q "cleanup edit orphan" supabase/functions/transaction-action/index.ts

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy transaction-action
        shell: bash
        run: |
          set -euo pipefail
          test -n "${SUPABASE_ACCESS_TOKEN:-}"
          supabase functions deploy transaction-action \
            --project-ref "$SUPABASE_PROJECT_REF" \
            --use-api \
            --debug

      - name: Verify deployed function metadata
        shell: bash
        run: |
          set -euo pipefail
          supabase functions list --project-ref "$SUPABASE_PROJECT_REF"
          echo "Deployment contains atomic payment submission and transaction orphan cleanup."
