name: Deploy transaction-action

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/transaction-action/**'
      - 'supabase/functions/approval-payment-action/**'
      - '.github/workflows/deploy-transaction-action.yml'

permissions:
  contents: read

concurrency:
  group: deploy-transaction-action-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: dmjsgtichrfxhyywstrt

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate transaction architecture
        shell: bash
        run: |
          set -euo pipefail
          TX='supabase/functions/transaction-action/index.ts'
          AP='supabase/functions/approval-payment-action'
          test -s "$TX"
          test -s "$AP/index.ts"
          test -s "$AP/submit.ts"
          test -s "$AP/verify.ts"
          grep -q 'Deno.serve' "$TX"
          grep -q 'TRANSAKSI_DOCUMENTS' "$TX"
          grep -q 'async function removeFiles' "$TX"
          grep -q 'function ownedUpload' "$TX"
          grep -q 'cleanup add orphan' "$TX"
          grep -q 'cleanup edit orphan' "$TX"
          grep -q 'function txPageSpec' "$TX"
          grep -q 'hasMore' "$TX"
          grep -q 'create_transaction_with_documents_atomic' "$TX"
          grep -q 'update_transaction_with_documents_atomic' "$TX"
          grep -q "writeMode:'normalized-atomic'" "$TX"
          grep -q 'version:5' "$TX"
          grep -q 'submit_transaction_payment_atomic' "$AP/submit.ts"
          grep -q 'verify_transaction_payment_batch_atomic' "$AP/verify.ts"
          grep -q 'p_verifier_signature_path' "$AP/verify.ts"
          ! grep -q 'approveTransaction:' "$TX"
          ! grep -q 'submitUserBuktiPembayaran:' "$TX"
          ! grep -q 'verifyUserPayment:' "$TX"

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy transaction-action
        shell: bash
        run: |
          set -euo pipefail
          test -n "${SUPABASE_ACCESS_TOKEN:-}"
          supabase functions deploy transaction-action \
            --project-ref "$SUPABASE_PROJECT_REF" \
            --use-api \
            --debug

      - name: Verify deployed function metadata
        shell: bash
        run: |
          set -euo pipefail
          supabase functions list --project-ref "$SUPABASE_PROJECT_REF"
          echo 'Deployment contains normalized atomic transaction writes and split approval/payment handlers.'
