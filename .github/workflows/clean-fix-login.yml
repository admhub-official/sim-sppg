name: Diagnose clean login parser

on:
  push:
    branches:
      - agent/fix-login-clean
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-login-clean

      - name: Record actual index structure
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          text = Path('index.html').read_text(encoding='utf-8')
          out = []
          for needle in [
              'SIM-SPPG INLINE FRONTEND BUNDLE START',
              'SIM-SPPG INLINE FRONTEND BUNDLE END',
              '<script id="sim-sppg-inline-frontend">',
              "'</table>' +",
              '</body></html>',
              '</body>',
          ]:
              positions = [m.start() for m in re.finditer(re.escape(needle), text, flags=re.I)]
              out.append(f'{needle}: {positions}')
          start = text.find('SIM-SPPG INLINE FRONTEND BUNDLE START')
          if start >= 0:
              out.append('\n--- bundle start context ---\n' + text[max(0,start-350):start+500])
          table = text.find("'</table>' +")
          if table >= 0:
              out.append('\n--- first table tail context ---\n' + text[max(0,table-250):table+800])
          # Locate the suspicious quote/newline before embedded body close.
          for m in re.finditer(r"'</table>'\s*\+", text):
              snippet = text[m.start():m.start()+500]
              if '</body></html>' in snippet:
                  out.append('\n--- report tail candidate ---\n' + snippet)
                  break
          Path('clean-login-diagnostic.log').write_text('\n'.join(out), encoding='utf-8')
          PY

      - name: Commit diagnostics
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add clean-login-diagnostic.log
          git commit -m "Record clean login parser diagnostics"
          git push
