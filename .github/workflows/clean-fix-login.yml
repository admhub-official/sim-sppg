name: Clean login parser repair

on:
  push:
    branches:
      - agent/fix-login-clean
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-login-clean

      - name: Repair bundle placement, report string, and script comments
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          # 1. Extract bundle while its HTML markers are still intact.
          start_marker = '<!-- SIM-SPPG INLINE FRONTEND BUNDLE START -->'
          end_marker = '<!-- SIM-SPPG INLINE FRONTEND BUNDLE END -->'
          start = text.find(start_marker)
          end = text.find(end_marker)
          if start < 0 or end < 0 or end <= start:
              raise SystemExit('Marker HTML bundle frontend tidak lengkap.')
          end += len(end_marker)
          bundle = text[start:end]
          text = text[:start] + text[end:]

          # 2. Repair the JavaScript string split by the misplaced bundle.
          broken_pattern = re.compile(
              r"('</table>'\s*\+)\s*'\s*\n\s*(</body></html>';)",
              flags=re.I,
          )
          text, fixed_count = broken_pattern.subn(
              r"\1\n    '\2",
              text,
              count=1,
          )
          if fixed_count != 1:
              raise SystemExit(f'String laporan rusak tidak ditemukan tepat satu kali: {fixed_count}')

          # 3. Put the bundle before the real final body closing tag.
          final_body = text.lower().rfind('</body>')
          if final_body < 0:
              raise SystemExit('Penutup body utama tidak ditemukan.')
          text = text[:final_body] + '\n' + bundle + '\n' + text[final_body:]

          # 4. Convert HTML section comments that remain inside script blocks.
          lines = text.splitlines(keepends=True)
          out = []
          in_script = False
          in_banner = False
          for line in lines:
              lower = line.lower()
              if not in_script and re.search(r'<script(?:\s|>)', lower):
                  in_script = True
                  out.append(line)
                  continue
              if in_script:
                  if not in_banner and '<!--' in line:
                      # Keep the moved bundle marker valid because it now sits outside script.
                      line = line.replace('<!--', '/*', 1)
                      if '-->' in line:
                          line = line.replace('-->', '*/', 1)
                      else:
                          in_banner = True
                      out.append(line)
                      continue
                  if in_banner:
                      if '-->' in line:
                          line = line.replace('-->', '*/', 1)
                          in_banner = False
                      out.append(line)
                      continue
                  if re.search(r'</script\s*>', lower):
                      in_script = False
              out.append(line)
          text = ''.join(out)

          path.write_text(text, encoding='utf-8')
          PY

      - name: Validate every inline JavaScript block
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          html = Path('index.html').read_text(encoding='utf-8')
          scripts = re.findall(r'<script(?![^>]*\bsrc=)[^>]*>(.*?)</script\s*>', html, flags=re.I|re.S)
          if not scripts:
              raise SystemExit('Inline script tidak ditemukan.')
          for i, script in enumerate(scripts, 1):
              Path(f'/tmp/inline-{i}.js').write_text(script, encoding='utf-8')
          print(f'Inline scripts validated: {len(scripts)}')
          PY
          for file in /tmp/inline-*.js; do node --check "$file"; done

      - name: Validate login symbols and final placement
        run: |
          grep -q 'function doLogin()' index.html
          grep -q 'onclick="doLogin()"' index.html
          python3 - <<'PY'
          from pathlib import Path
          text = Path('index.html').read_text(encoding='utf-8')
          marker = text.find('SIM-SPPG INLINE FRONTEND BUNDLE START')
          final_body = text.lower().rfind('</body>')
          if marker < 0 or marker > final_body:
              raise SystemExit('Bundle frontend belum berada sebelum body utama.')
          if text.count('SIM-SPPG INLINE FRONTEND BUNDLE START') != 1:
              raise SystemExit('Marker bundle frontend tidak tunggal.')
          PY

      - name: Clean temporary files and commit final fix
        run: |
          rm -f \
            .github/workflows/clean-fix-login.yml \
            .github/workflows/fix-login-script-comments.yml \
            .trigger-login-fix \
            clean-login-diagnostic.log \
            syntax-check.log \
            bundle-marker.log \
            broken-string-context.log
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Perbaiki parser JavaScript dan tombol login"
          git push
