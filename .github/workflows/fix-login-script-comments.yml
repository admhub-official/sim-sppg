name: Diagnose login script syntax

on:
  push:
    branches:
      - agent/fix-login-script-comments

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-login-script-comments

      - name: Extract and validate inline scripts
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          html = Path('index.html').read_text(encoding='utf-8')
          scripts = re.findall(r'<script(?![^>]*\bsrc=)[^>]*>(.*?)</script\s*>', html, flags=re.I|re.S)
          for i, script in enumerate(scripts, 1):
              Path(f'/tmp/inline-{i}.js').write_text(script, encoding='utf-8')
          Path('syntax-check.log').write_text(f'inline_scripts={len(scripts)}\n', encoding='utf-8')
          PY
          set +e
          for f in /tmp/inline-*.js; do
            echo "===== $f =====" >> syntax-check.log
            node --check "$f" >> syntax-check.log 2>&1
            echo "exit=$?" >> syntax-check.log
          done
          set -e

      - name: Commit diagnostic log
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add syntax-check.log
          git commit -m "Tambahkan diagnostik parser sementara"
          git push
