name: Inspect inline bundle markers

on:
  push:
    branches:
      - agent/fix-login-script-comments

permissions:
  contents: write

jobs:
  inspect:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-login-script-comments

      - name: Write bundle marker diagnostics
        run: |
          python3 - <<'PY'
          from pathlib import Path
          text = Path('index.html').read_text(encoding='utf-8')
          needles = [
              'SIM-SPPG INLINE FRONTEND BUNDLE START',
              'SIM-SPPG INLINE FRONTEND BUNDLE END',
              '<script id="sim-sppg-inline-frontend">',
              '</script>',
              '</body>'
          ]
          lines = []
          for needle in needles:
              positions = []
              start = 0
              while True:
                  i = text.find(needle, start)
                  if i < 0: break
                  positions.append(i)
                  start = i + 1
              lines.append(f'{needle}: {positions}')
          start = text.find('SIM-SPPG INLINE FRONTEND BUNDLE START')
          if start >= 0:
              lines.append('--- start context ---')
              lines.append(text[max(0,start-300):start+500])
          Path('bundle-marker.log').write_text('\n'.join(lines), encoding='utf-8')
          PY

      - name: Commit diagnostic
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add bundle-marker.log
          git commit -m "Tambahkan diagnostik marker bundle sementara"
          git push
