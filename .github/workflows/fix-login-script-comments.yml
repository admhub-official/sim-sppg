name: Inspect remaining broken string

on:
  push:
    branches:
      - agent/fix-login-script-comments
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  inspect:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-login-script-comments

      - name: Write inline script context
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          html = Path('index.html').read_text(encoding='utf-8')
          matches = list(re.finditer(r'<script(?![^>]*\bsrc=)[^>]*>(.*?)</script\s*>', html, flags=re.I|re.S))
          scripts = [m.group(1) for m in matches]
          lines_out = [f'inline_scripts={len(scripts)}']
          for i, script in enumerate(scripts, 1):
              lines = script.splitlines()
              lines_out.append(f'===== inline-{i} =====')
              if i == 2:
                  for n in range(3548, min(3575, len(lines)+1)):
                      lines_out.append(f'{n}: {lines[n-1]}')
                  absolute_start_line = html[:matches[i-1].start(1)].count('\n') + 1
                  lines_out.append(f'absolute_start_line={absolute_start_line}')
                  lines_out.append(f'absolute_error_line={absolute_start_line + 3558 - 1}')
          Path('broken-string-context.log').write_text('\n'.join(lines_out) + '\n', encoding='utf-8')
          PY

      - name: Commit context
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add broken-string-context.log
          git commit -m "Tambahkan konteks string rusak sementara"
          git push
