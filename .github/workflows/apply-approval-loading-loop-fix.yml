name: Apply Approval loading loop fix

on:
  push:
    branches:
      - fix/approval-loading-loop-cleanup
    paths:
      - 'scripts/apply-approval-loading-loop-fix.py'
      - '.github/workflows/apply-approval-loading-loop-fix.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'scripts/apply-approval-loading-loop-fix.py'
      - '.github/workflows/apply-approval-loading-loop-fix.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/approval-loading-loop-cleanup
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply loader lifecycle fix
        run: python scripts/apply-approval-loading-loop-fix.py
      - name: Run focused checks
        run: |
          node --check app.js
          node scripts/check-approval-row-detail.mjs
          node scripts/check-verifier-flow-regression.mjs
          node --check _worker.js
      - name: Commit generated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.js index.html sw.js _worker.js scripts/check-approval-row-detail.mjs scripts/check-verifier-flow-regression.mjs
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "fix: stop Approval loading loop"
            git push origin HEAD:fix/approval-loading-loop-cleanup
          fi
