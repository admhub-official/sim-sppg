name: Diagnose remaining login syntax

on:
  push:
    branches:
      - agent/fix-login-syntax-final
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-login-syntax-final

      - name: Apply targeted comment repair in working tree
        run: |
          cp index.html /tmp/index-original.html
          python3 - <<'PY'
          from pathlib import Path
          import re
          path = Path('index.html')
          html = path.read_text(encoding='utf-8')
          script_re = re.compile(r'(<script(?![^>]*\bsrc=)[^>]*>)(.*?)(</script\s*>)', re.I | re.S)
          fixed_count = 0
          def repair_script(match):
              global fixed_count
              open_tag, script, close_tag = match.groups()
              script, c1 = re.subn(
                  r'(?ms)^(\s*)/\*\s*(=+\s*\n\s*[^\n]+\n\s*=+)\s*-->\s*$',
                  lambda m: m.group(1) + '/* ' + m.group(2) + ' */',
                  script,
              )
              script, c2 = re.subn(
                  r'(?ms)^(\s*)<!--\s*(=+\s*\n\s*[^\n]+\n\s*=+)\s*-->\s*$',
                  lambda m: m.group(1) + '/* ' + m.group(2) + ' */',
                  script,
              )
              fixed_count += c1 + c2
              return open_tag + script + close_tag
          repaired = script_re.sub(repair_script, html)
          path.write_text(repaired, encoding='utf-8')
          print(f'Working-tree banner fixes: {fixed_count}')
          PY

      - name: Produce exact parser report
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re, subprocess
          html = Path('index.html').read_text(encoding='utf-8')
          scripts = re.findall(r'<script(?![^>]*\bsrc=)[^>]*>(.*?)</script\s*>', html, flags=re.I|re.S)
          report = [f'inline_scripts={len(scripts)}']
          all_ok = True
          for idx, script in enumerate(scripts, 1):
              p = Path(f'/tmp/inline-{idx}.js')
              p.write_text(script, encoding='utf-8')
              proc = subprocess.run(['node','--check',str(p)], text=True, capture_output=True)
              report.append(f'\n===== inline-{idx} exit={proc.returncode} lines={len(script.splitlines())} =====')
              if proc.stderr:
                  report.append(proc.stderr)
              if proc.returncode:
                  all_ok = False
                  m = re.search(r'inline-\d+\.js:(\d+)', proc.stderr)
                  if m:
                      line_no = int(m.group(1))
                      lines = script.splitlines()
                      start = max(1, line_no - 20)
                      end = min(len(lines), line_no + 20)
                      report.append(f'--- context {start}-{end} ---')
                      for n in range(start, end+1):
                          report.append(f'{n:05d}: {lines[n-1]}')
          report.append(f'\nall_scripts_ok={all_ok}')
          Path('remaining-login-syntax.log').write_text('\n'.join(report) + '\n', encoding='utf-8')
          PY

      - name: Restore application and commit diagnostic only
        run: |
          cp /tmp/index-original.html index.html
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add remaining-login-syntax.log
          git commit -m "Catat error parser setelah perbaikan komentar terkontrol"
          git push
