name: Fix login syntax final

on:
  push:
    branches:
      - agent/fix-login-syntax-final

permissions:
  contents: write

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-login-syntax-final

      - name: Repair only malformed section comments inside inline scripts
        run: |
          cp index.html /tmp/index-before.html
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path('index.html')
          html = path.read_text(encoding='utf-8')

          script_re = re.compile(r'(<script(?![^>]*\bsrc=)[^>]*>)(.*?)(</script\s*>)', re.I | re.S)
          fixed_count = 0

          def repair_script(match):
              global fixed_count
              open_tag, script, close_tag = match.groups()

              # Bentuk 1: komentar JS dibuka dengan /* tetapi ditutup dengan -->.
              script, count1 = re.subn(
                  r'(?ms)^(\s*)/\*\s*(=+\s*\n\s*[^\n]+\n\s*=+)\s*-->\s*$',
                  lambda m: m.group(1) + '/* ' + m.group(2) + ' */',
                  script,
              )

              # Bentuk 2: komentar HTML banner berada langsung di dalam JavaScript.
              script, count2 = re.subn(
                  r'(?ms)^(\s*)<!--\s*(=+\s*\n\s*[^\n]+\n\s*=+)\s*-->\s*$',
                  lambda m: m.group(1) + '/* ' + m.group(2) + ' */',
                  script,
              )

              fixed_count += count1 + count2
              return open_tag + script + close_tag

          repaired = script_re.sub(repair_script, html)
          if fixed_count == 0:
              raise SystemExit('Tidak ada komentar section script yang diperbaiki.')

          path.write_text(repaired, encoding='utf-8')
          print(f'Fixed malformed script section comments: {fixed_count}')
          PY

      - name: Validate every browser-visible inline script
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          html = Path('index.html').read_text(encoding='utf-8')
          scripts = re.findall(r'<script(?![^>]*\bsrc=)[^>]*>(.*?)</script\s*>', html, flags=re.I|re.S)
          if not scripts:
              raise SystemExit('Inline script tidak ditemukan.')
          for i, script in enumerate(scripts, 1):
              Path(f'/tmp/inline-{i}.js').write_text(script, encoding='utf-8')
          print(f'Inline scripts: {len(scripts)}')
          PY
          for file in /tmp/inline-*.js; do
            echo "Checking $file"
            node --check "$file"
          done

      - name: Validate login symbols and exact scope
        run: |
          grep -q 'function doLogin()' index.html
          grep -q 'onclick="doLogin()"' index.html
          python3 - <<'PY'
          from pathlib import Path
          import re
          before = Path('/tmp/index-before.html').read_text(encoding='utf-8')
          after = Path('index.html').read_text(encoding='utf-8')

          # Selain komentar section yang rusak, tidak boleh ada perubahan fungsi/statement.
          normalize = lambda s: re.sub(
              r'(?ms)^\s*(?:/\*|<!--)\s*=+\s*\n\s*[^\n]+\n\s*=+\s*(?:\*/|-->)\s*$',
              '<SECTION_COMMENT>',
              s,
          )
          if normalize(before) != normalize(after):
              raise SystemExit('Perubahan melampaui komentar section yang ditargetkan.')
          print('Scope validation passed.')
          PY

      - name: Commit only validated index
        run: |
          rm -f .github/workflows/fix-login-syntax-final.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add index.html .github/workflows/fix-login-syntax-final.yml
          git commit -m "Perbaiki seluruh komentar script yang memblokir login"
          git push
