name: Fix login syntax final

on:
  push:
    branches:
      - agent/fix-login-syntax-final
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-login-syntax-final

      - name: Apply narrowly targeted syntax repairs
        run: |
          cp index.html /tmp/index-before.html
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path('index.html')
          html = path.read_text(encoding='utf-8')
          script_re = re.compile(r'(<script(?![^>]*\bsrc=)[^>]*>)(.*?)(</script\s*>)', re.I | re.S)
          fixed = []

          def repair_script(match):
              open_tag, script, close_tag = match.groups()

              script, c1 = re.subn(
                  r'(?ms)^(\s*)/\*\s*(=+\s*\n\s*[^\n]+\n\s*=+)\s*-->\s*$',
                  lambda m: m.group(1) + '/* ' + m.group(2) + ' */',
                  script,
              )
              if c1:
                  fixed.append(('hybrid_banner', c1))

              script, c2 = re.subn(
                  r'(?ms)^(\s*)<!--\s*(=+\s*\n\s*[^\n]+\n\s*=+)\s*-->\s*$',
                  lambda m: m.group(1) + '/* ' + m.group(2) + ' */',
                  script,
              )
              if c2:
                  fixed.append(('html_banner', c2))

              exact_bad = "catch (e) { <!-- noop jika browser blokir autoplay audio --> }"
              exact_good = "catch (e) { /* noop jika browser blokir autoplay audio */ }"
              count3 = script.count(exact_bad)
              if count3:
                  script = script.replace(exact_bad, exact_good)
                  fixed.append(('autoplay_noop', count3))

              return open_tag + script + close_tag

          repaired = script_re.sub(repair_script, html)
          if not fixed:
              raise SystemExit('Tidak ada pola syntax yang ditargetkan ditemukan.')

          path.write_text(repaired, encoding='utf-8')
          print('Repairs:', fixed)
          PY

      - name: Validate all browser-visible inline JavaScript
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          html = Path('index.html').read_text(encoding='utf-8')
          scripts = re.findall(r'<script(?![^>]*\bsrc=)[^>]*>(.*?)</script\s*>', html, flags=re.I|re.S)
          if not scripts:
              raise SystemExit('Inline script tidak ditemukan.')
          for i, script in enumerate(scripts, 1):
              Path(f'/tmp/inline-{i}.js').write_text(script, encoding='utf-8')
          print(f'Inline scripts: {len(scripts)}')
          PY
          for file in /tmp/inline-*.js; do
            echo "Checking $file"
            node --check "$file"
          done

      - name: Validate login and exact change scope
        run: |
          grep -q 'function doLogin()' index.html
          grep -q 'onclick="doLogin()"' index.html
          python3 - <<'PY'
          from pathlib import Path
          import re

          before = Path('/tmp/index-before.html').read_text(encoding='utf-8')
          after = Path('index.html').read_text(encoding='utf-8')

          def normalize(text):
              text = re.sub(
                  r'(?ms)^\s*(?:/\*|<!--)\s*=+\s*\n\s*[^\n]+\n\s*=+\s*(?:\*/|-->)\s*$',
                  '<SECTION_COMMENT>',
                  text,
              )
              text = text.replace(
                  'catch (e) { <!-- noop jika browser blokir autoplay audio --> }',
                  'catch (e) { <NOOP_COMMENT> }',
              )
              text = text.replace(
                  'catch (e) { /* noop jika browser blokir autoplay audio */ }',
                  'catch (e) { <NOOP_COMMENT> }',
              )
              return text

          if normalize(before) != normalize(after):
              raise SystemExit('Perubahan melampaui tiga pola komentar yang ditargetkan.')
          print('Scope validation passed.')
          PY

      - name: Commit validated index only
        run: |
          rm -f \
            .github/workflows/fix-login-syntax-final.yml \
            .trigger-final-login-fix \
            remaining-login-syntax.log
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Perbaiki syntax JavaScript yang memblokir login"
          git push
