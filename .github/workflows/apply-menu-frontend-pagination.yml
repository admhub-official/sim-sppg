name: Apply menu frontend pagination

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/apply-menu-frontend-pagination.py'
      - '.github/workflows/apply-menu-frontend-pagination.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python scripts/apply-menu-frontend-pagination.py
      - run: |
          node --check app.js
          grep -q 'menuServerPaged' app.js
          grep -q "getMenuHarian.*pageSize" app.js
      - run: |
          if git diff --quiet -- app.js; then echo 'No changes'; exit 0; fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add app.js
          git commit -m 'feat: use server pagination for menu MBG'
          git push

