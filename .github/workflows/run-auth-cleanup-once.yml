name: Run auth cleanup once
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  patch-auth-branch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/redesign-auth-ui
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Extract and run auth patch
        run: |
          python - <<'PY'
          from pathlib import Path
          text = Path('.github/workflows/auth-final-cleanup.yml').read_text(encoding='utf-8')
          start = text.index("cat > /tmp/patch_auth.py <<'PY'\n") + len("cat > /tmp/patch_auth.py <<'PY'\n")
          end = text.index("\n          PY\n", start)
          lines = text[start:end].splitlines()
          cleaned = '\n'.join(line[10:] if line.startswith('          ') else line for line in lines) + '\n'
          Path('/tmp/patch_auth.py').write_text(cleaned, encoding='utf-8')
          PY
          python /tmp/patch_auth.py
          node --check app.js
      - name: Remove temporary branch helpers
        run: rm -f .github/workflows/auth-final-cleanup.yml .github/AUTH_FINAL_TRIGGER.txt
      - name: Commit cleaned auth UI
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "redesign: replace auth UI with compact responsive layout"
          git push origin agent/redesign-auth-ui
      - name: Remove one-time workflow from main
        run: |
          git fetch origin main
          git switch main
          git pull --ff-only origin main
          git rm .github/workflows/run-auth-cleanup-once.yml
          git commit -m "chore: remove one-time auth cleanup workflow"
          git push origin main
