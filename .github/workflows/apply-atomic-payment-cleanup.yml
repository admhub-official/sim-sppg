name: Apply atomic payment cleanup

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/apply-atomic-payment-cleanup.py'
      - '.github/workflows/apply-atomic-payment-cleanup.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - run: python scripts/apply-atomic-payment-cleanup.py
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add supabase/functions/transaction-action/index.ts
          git diff --cached --quiet && exit 0
          git commit -m "feat: make payment submission atomic and clean orphan uploads"
          git push
