name: Deploy notification dispatcher

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/notification-dispatch-action/**'
      - '.github/workflows/deploy-notification-dispatch.yml'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: dmjsgtichrfxhyywstrt
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Validate source
        run: |
          grep -Fq "dispatchNotification" supabase/functions/notification-dispatch-action/index.ts
          grep -Fq "ADMIN_ASSIGNMENT" supabase/functions/notification-dispatch-action/recipients.ts
          grep -Fq "404||status===410" supabase/functions/notification-dispatch-action/index.ts
      - name: Deploy
        run: |
          supabase functions deploy notification-dispatch-action \
            --project-ref "$SUPABASE_PROJECT_REF"
      - name: List functions
        run: supabase functions list --project-ref "$SUPABASE_PROJECT_REF"
