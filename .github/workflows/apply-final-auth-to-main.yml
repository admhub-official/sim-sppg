name: Apply final auth UI to main
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Apply validated auth files
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git fetch origin agent/final-auth-cleanup
          git checkout origin/agent/final-auth-cleanup -- index.html app.js
          node --check app.js
          python - <<'PY'
          from pathlib import Path
          index = Path('index.html').read_text(encoding='utf-8')
          app = Path('app.js').read_text(encoding='utf-8')
          assert index.count('AUTHENTICATION — MINIMAL COMPACT UI') == 1
          assert 'AUTHENTICATION — CLEAN MODERN UI' not in index
          assert 'Arsitektur operasional terintegrasi' not in index
          assert 'auth-architecture-story' not in app
          assert 'auth-architecture-formside' not in app
          assert index.count('<style') == index.count('</style>')
          assert index.count('<div') == index.count('</div>')
          PY
          git add index.html app.js
          git commit -m "redesign: finalize compact responsive auth UI"
          git push origin main
      - name: Remove one-time workflow
        run: |
          git pull --ff-only origin main
          git rm .github/workflows/apply-final-auth-to-main.yml
          git commit -m "chore: remove one-time auth deployment workflow"
          git push origin main
