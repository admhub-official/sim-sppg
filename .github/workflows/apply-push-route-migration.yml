name: Apply push route migration

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/apply-push-route-migration.py'
      - '.github/workflows/apply-push-route-migration.yml'

permissions:
  contents: write

concurrency:
  group: push-route-migration
  cancel-in-progress: false

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply patch
        run: python -u scripts/apply-push-route-migration.py
      - name: Validate frontend
        run: |
          set -euo pipefail
          node --check app.js
          grep -Fq 'PUSH_FN_URL' app.js
          grep -Fq 'PUSH_PUBLIC_FN_URL' app.js
          grep -Fq 'savePushSubscription:1' app.js
          grep -Fq 'getPushPublicKey:1' app.js
      - name: Commit source
        run: |
          set -euo pipefail
          if git diff --quiet -- app.js; then
            echo 'Push routes already current.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add app.js
          git commit -m 'feat: move push routes out of dynamic action'
          git push
