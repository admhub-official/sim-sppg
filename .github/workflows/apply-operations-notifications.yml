name: Apply operations notifications

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/apply-operations-notifications.py'
      - 'supabase/functions/notification-dispatch-action/recipients.ts'
      - '.github/workflows/apply-operations-notifications.yml'

permissions:
  contents: write

jobs:
  patch-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Apply operations notification patch
        run: python scripts/apply-operations-notifications.py
      - name: Validate notification hooks
        run: |
          grep -Fq "async function systemNotify(" supabase/functions/operations-action/index.ts
          grep -Fq "Pending payment baru" supabase/functions/operations-action/index.ts
          grep -Fq "Survei bahan baku baru" supabase/functions/operations-action/index.ts
          grep -Fq "Serah terima baru" supabase/functions/operations-action/index.ts
          grep -Fq "Menu MBG baru" supabase/functions/operations-action/index.ts
          grep -Fq "Assignment ADMIN baru" supabase/functions/operations-action/index.ts
          grep -Fq "mode==='role'" supabase/functions/notification-dispatch-action/recipients.ts
      - name: Commit patched operations source
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add supabase/functions/operations-action/index.ts
          if git diff --cached --quiet; then
            echo 'Operations notifications already applied.'
          else
            git commit -m 'Wire automatic notifications for operations modules'
            git push
          fi
      - name: Deploy notification dispatcher
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy notification-dispatch-action --project-ref dmjsgtichrfxhyywstrt --use-api --yes
      - name: Deploy operations action
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy operations-action --project-ref dmjsgtichrfxhyywstrt --use-api --yes
