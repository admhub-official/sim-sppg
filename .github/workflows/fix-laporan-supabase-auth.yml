name: Fix laporan Supabase auth

on:
  push:
    paths:
      - '.github/workflows/fix-laporan-supabase-auth.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Patch laporan flow
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          p = Path('index.html')
          s = p.read_text(encoding='utf-8')

          old_flow = '''    // STEP 3: Upload ke Supabase Storage
    updateLaporanProgress('☁️ Step 3/5 — Mengupload PDF ke Storage...');
    const ts = Date.now();
    fileName = `laporan_${tglMulai}_${tglSelesai}_${ts}.pdf`;
    const uploadResult = await uploadLaporanToStorage(pdfBlob, fileName, sbToken);
    fileUrl = uploadResult;

    // STEP 4: Kirim ke Telegram
    updateLaporanProgress('📨 Step 4/5 — Mengirim ke Telegram...');
    await kirimLaporanTelegram(pdfBlob, fileName, chatId, {
      tglMulai, tglSelesai, userName, userRole,
      jumlahTransaksi: transaksiData.length
    });
    statusKirim = true;

    // STEP 5: Catat riwayat
    updateLaporanProgress('💾 Step 5/5 — Menyimpan riwayat...');
    await simpanRiwayatLaporan({
      periode_awal: tglMulai,
      periode_akhir: tglSelesai,
      file_url: fileUrl,
      file_name: fileName,
      generated_by: userEmail,
      generated_by_name: userName,
      generated_by_role: userRole,
      status_kirim: true,
      jumlah_transaksi: transaksiData.length,
      keterangan: `Chat ID: ${chatId}`
    }, sbToken);'''

          new_flow = '''    // STEP 3: Kirim ke Telegram lebih dulu agar tidak ikut gagal saat Storage bermasalah
    const ts = Date.now();
    fileName = `laporan_${tglMulai}_${tglSelesai}_${ts}.pdf`;
    updateLaporanProgress('📨 Step 3/5 — Mengirim PDF ke Telegram...');
    await kirimLaporanTelegram(pdfBlob, fileName, chatId, {
      tglMulai, tglSelesai, userName, userRole,
      jumlahTransaksi: transaksiData.length
    });
    statusKirim = true;

    // STEP 4: Upload ke Storage secara non-blocking
    let storageError = null;
    try {
      updateLaporanProgress('☁️ Step 4/5 — Mengupload PDF ke Storage...');
      fileUrl = await uploadLaporanToStorage(pdfBlob, fileName);
    } catch (errStorage) {
      storageError = errStorage;
      console.warn('[LAPORAN] Telegram berhasil, tetapi Storage gagal:', errStorage);
      fileUrl = null;
    }

    // STEP 5: Catat riwayat; tetap disimpan walaupun Storage gagal
    updateLaporanProgress('💾 Step 5/5 — Menyimpan riwayat...');
    try {
      await simpanRiwayatLaporan({
        periode_awal: tglMulai,
        periode_akhir: tglSelesai,
        file_url: fileUrl,
        file_name: fileName,
        generated_by: userEmail,
        generated_by_name: userName,
        generated_by_role: userRole,
        status_kirim: true,
        jumlah_transaksi: transaksiData.length,
        keterangan: storageError
          ? `Chat ID: ${chatId} — Telegram berhasil, Storage gagal: ${storageError.message}`
          : `Chat ID: ${chatId} — Telegram dan Storage berhasil`
      });
    } catch (historyError) {
      console.warn('[LAPORAN] Telegram berhasil, tetapi riwayat gagal disimpan:', historyError);
    }'''

          if old_flow not in s:
              raise SystemExit('Target alur laporan tidak ditemukan; patch dibatalkan.')
          s = s.replace(old_flow, new_flow, 1)

          old_upload = '''// --- Upload PDF ke Supabase Storage ---
async function uploadLaporanToStorage(blob, fileName, token) {
  const url = `${SUPABASE_URL_LAPORAN}/storage/v1/object/laporan_pdf/${fileName}`;
  const res = await fetch(url, {
    method: 'POST',
    headers: {
      Authorization: token ? `Bearer ${token}` : '',
      apikey: window._supabaseKey || '',
      'Content-Type': 'application/pdf',
      'x-upsert': 'true'
    },
    body: blob
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(`Upload storage gagal: ${err}`);
  }
  return `${SUPABASE_URL_LAPORAN}/storage/v1/object/public/laporan_pdf/${fileName}`;
}'''

          new_upload = '''// --- Ambil token resmi Supabase; fallback ke publishable/anon key untuk request anonim ---
async function getLaporanSupabaseToken() {
  try {
    if (typeof supabase !== 'undefined' && supabase?.auth?.getSession) {
      const { data, error } = await supabase.auth.getSession();
      if (error) console.warn('[LAPORAN AUTH] Gagal membaca session:', error);
      if (data?.session?.access_token) return data.session.access_token;
    }
  } catch (err) {
    console.warn('[LAPORAN AUTH] Session tidak tersedia:', err);
  }
  return window._supabaseKey || null;
}

// --- Upload PDF ke Supabase Storage ---
async function uploadLaporanToStorage(blob, fileName) {
  if (!(blob instanceof Blob)) throw new Error('File PDF tidak valid.');

  // Utamakan Supabase client karena header apikey dan Authorization dikelola otomatis.
  if (typeof supabase !== 'undefined' && supabase?.storage?.from) {
    const { error } = await supabase.storage
      .from('laporan_pdf')
      .upload(fileName, blob, {
        contentType: 'application/pdf',
        upsert: true
      });

    if (error) throw new Error(`Upload storage gagal: ${error.message}`);

    const { data } = supabase.storage.from('laporan_pdf').getPublicUrl(fileName);
    return data?.publicUrl || `${SUPABASE_URL_LAPORAN}/storage/v1/object/public/laporan_pdf/${encodeURIComponent(fileName)}`;
  }

  // Fallback REST tetap wajib mengirim Authorization, termasuk untuk role anon.
  const token = await getLaporanSupabaseToken();
  const apiKey = window._supabaseKey || token;
  if (!token || !apiKey) throw new Error('Supabase token/publishable key tidak tersedia.');

  const url = `${SUPABASE_URL_LAPORAN}/storage/v1/object/laporan_pdf/${encodeURIComponent(fileName)}`;
  const res = await fetch(url, {
    method: 'POST',
    headers: {
      Authorization: `Bearer ${token}`,
      apikey: apiKey,
      'Content-Type': 'application/pdf',
      'x-upsert': 'true'
    },
    body: blob
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(`Upload storage gagal: ${err}`);
  }
  return `${SUPABASE_URL_LAPORAN}/storage/v1/object/public/laporan_pdf/${encodeURIComponent(fileName)}`;
}'''

          if old_upload not in s:
              raise SystemExit('Fungsi upload lama tidak ditemukan; patch dibatalkan.')
          s = s.replace(old_upload, new_upload, 1)

          old_history = '''// --- Simpan riwayat ke tabel riwayat_laporan ---
async function simpanRiwayatLaporan(payload, token) {
  const res = await fetch(`${SUPABASE_URL_LAPORAN}/rest/v1/riwayat_laporan`, {
    method: 'POST',
    headers: {
      apikey: window._supabaseKey || '',
      Authorization: token ? `Bearer ${token}` : '',
      'Content-Type': 'application/json',
      Prefer: 'return=minimal'
    },
    body: JSON.stringify(payload)
  });
  if (!res.ok) {
    const err = await res.text();
    console.warn('[LAPORAN] Gagal simpan riwayat:', err);
  }
}'''

          new_history = '''// --- Simpan riwayat ke tabel riwayat_laporan ---
async function simpanRiwayatLaporan(payload) {
  if (typeof supabase !== 'undefined' && supabase?.from) {
    const { data, error } = await supabase
      .from('riwayat_laporan')
      .insert(payload)
      .select()
      .single();
    if (error) throw new Error(`Gagal menyimpan riwayat: ${error.message}`);
    return data;
  }

  const token = await getLaporanSupabaseToken();
  const apiKey = window._supabaseKey || token;
  if (!token || !apiKey) throw new Error('Supabase token/publishable key tidak tersedia.');

  const res = await fetch(`${SUPABASE_URL_LAPORAN}/rest/v1/riwayat_laporan`, {
    method: 'POST',
    headers: {
      apikey: apiKey,
      Authorization: `Bearer ${token}`,
      'Content-Type': 'application/json',
      Prefer: 'return=representation'
    },
    body: JSON.stringify(payload)
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(`Gagal menyimpan riwayat: ${err}`);
  }
  const rows = await res.json();
  return rows?.[0] || null;
}'''

          if old_history not in s:
              raise SystemExit('Fungsi riwayat lama tidak ditemukan; patch dibatalkan.')
          s = s.replace(old_history, new_history, 1)

          # Pastikan pencatatan gagal juga memakai helper baru tanpa token manual.
          s = s.replace('''      const sbToken2 = window._supabaseToken || null;\n''', '', 1)
          s = s.replace('''      }, sbToken2);''', '''      });''', 1)

          p.write_text(s, encoding='utf-8')
          PY

      - name: Commit patched file and remove temporary workflow
        shell: bash
        run: |
          rm -f .github/workflows/fix-laporan-supabase-auth.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/fix-laporan-supabase-auth.yml
          git commit -m "fix: send laporan to Telegram before optional Supabase storage"
          git push
