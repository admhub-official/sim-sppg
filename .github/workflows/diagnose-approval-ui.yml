name: Finalize Approval legacy cleanup

on:
  push:
    branches:
      - fix/approval-responsive-ui-cleanup
    paths:
      - '.github/workflows/diagnose-approval-ui.yml'

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/approval-responsive-ui-cleanup
          fetch-depth: 0
      - name: Remove remaining retired Approval selectors
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          old = '''    /* R2: Status indicator left border — hanya pada tabel approval */
              .approval-table tbody tr.status-belum-bayar { border-left: 4px solid var(--rose); }
              .approval-table tbody tr.status-menunggu-verifikasi { border-left: 4px solid var(--orange); }
              .approval-table tbody tr.status-belum-lunas { border-left: 4px solid var(--amber); }
              .approval-table tbody tr.status-transfer { border-left: 4px solid var(--blue); }
              .approval-table tbody tr.status-cash { border-left: 4px solid var(--emerald); }
              /* Pastikan padding tetap rapi saat ada border kiri */
              .approval-table tbody td:first-child { padding-left: 12px; }
              @media (min-width: 768px) {
                .approval-table tbody td:first-child { padding-left: 16px; }
              }
          '''
          if old not in text:
              raise SystemExit('remaining legacy Approval selector block not found')
          path.write_text(text.replace(old, '', 1), encoding='utf-8')
          PY
          node scripts/check-approval-row-detail.mjs
      - name: Commit final cleanup and remove diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f diag-approval-selectors.txt diag-approval-check.txt .github/workflows/diagnose-approval-ui.yml
          git add index.html
          git commit -m "refactor: remove final retired Approval selectors"
          git push origin HEAD:fix/approval-responsive-ui-cleanup
