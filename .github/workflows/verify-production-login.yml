name: Verify production login script

on:
  push:
    branches:
      - fix/login-syntax-error
    paths:
      - .github/workflows/verify-production-login.yml

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/login-syntax-error
      - name: Wait for Cloudflare deployment and validate HTML
        shell: bash
        run: |
          set -e
          rm -f production-login-verification.txt
          for attempt in $(seq 1 18); do
            url="https://sim-sppg.pages.dev/?page=transaksi&verify=${GITHUB_SHA}-${attempt}-$(date +%s)"
            curl -fsSL --retry 2 -H 'Cache-Control: no-cache' -H 'Pragma: no-cache' "$url" -o /tmp/production.html
            if grep -q '/session-fix.js?v=20260714-3' /tmp/production.html && grep -q '/laporan-fix.js?v=20260714-3' /tmp/production.html; then
              if python3 <<'PY'
          from pathlib import Path
          import re, subprocess, tempfile, sys
          html = Path('/tmp/production.html').read_text(encoding='utf-8', errors='strict')
          matches = list(re.finditer(r'<script\b([^>]*)>(.*?)</script\s*>', html, re.I | re.S))
          failures = []
          inline_count = 0
          with tempfile.TemporaryDirectory() as td:
              for idx, m in enumerate(matches, 1):
                  attrs = m.group(1) or ''
                  if re.search(r'\bsrc\s*=', attrs, re.I):
                      continue
                  inline_count += 1
                  p = Path(td) / f'inline-{idx}.js'
                  p.write_text(m.group(2), encoding='utf-8')
                  proc = subprocess.run(['node', '--check', str(p)], text=True, capture_output=True)
                  if proc.returncode != 0:
                      failures.append(proc.stderr or proc.stdout)
          report_at = html.find('<script src="/laporan-fix.js?v=20260714-3"></script>')
          real_body_at = html.lower().rfind('</body>')
          print_string_at = html.find("'</body></html>';")
          if failures or inline_count < 3 or not (print_string_at < report_at < real_body_at):
              print('\n'.join(failures), file=sys.stderr)
              raise SystemExit(1)
          Path('production-login-verification.txt').write_text(
              f'PASS\ninline scripts valid: {inline_count}\nreport script position: {report_at}\nreal body position: {real_body_at}\n',
              encoding='utf-8'
          )
          PY
              then
                echo "Production validation passed on attempt $attempt" >> production-login-verification.txt
                exit 0
              fi
            fi
            echo "Attempt $attempt: deployment not ready" >&2
            sleep 10
          done
          echo 'FAIL: production did not become valid in time' > production-login-verification.txt
          exit 1
      - name: Commit verification result
        if: always()
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add production-login-verification.txt
          git commit -m "chore: record production login verification" || exit 0
          git push origin HEAD:fix/login-syntax-error
