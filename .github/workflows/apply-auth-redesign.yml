name: Apply auth redesign
on:
  push:
    branches: [agent/redesign-auth-ui]
permissions:
  contents: write
jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/redesign-auth-ui
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Replace authentication visual layer
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          p=Path('index.html')
          s=p.read_text(encoding='utf-8')
          start='''/* ============================================================\n   AUTHENTICATION — LOGIN, REGISTRATION, AND OTP\n   ============================================================ */'''
          end='''/* ============================================================\n   REPORT UI — EXISTING STYLES\n   ============================================================ */'''
          css=r'''/* ============================================================
   AUTHENTICATION — CLEAN MODERN UI
   ============================================================ */
          #authOverlay.auth-architecture{position:fixed!important;inset:0!important;z-index:9999!important;display:grid!important;grid-template-columns:minmax(320px,38%) minmax(480px,62%)!important;min-height:100dvh;padding:0!important;overflow:auto!important;background:#f6f8fb!important;color:#172033}
          #authOverlay.auth-architecture.hidden{display:none!important}
          .auth-architecture-story{position:relative;isolation:isolate;display:flex;flex-direction:column;justify-content:space-between;min-height:100dvh;padding:clamp(32px,5vw,70px);overflow:hidden;color:#fff;background:#163b59}
          .auth-architecture-story:before{position:absolute;inset:auto -20% -28% auto;z-index:-1;width:min(54vw,720px);aspect-ratio:1;content:"";border:1px solid rgba(255,255,255,.13);border-radius:50%;box-shadow:inset 0 0 0 70px rgba(255,255,255,.025),inset 0 0 0 145px rgba(255,255,255,.018)}
          .auth-architecture-brand,.auth-brand-inline{display:flex;align-items:center}.auth-architecture-brand{gap:12px;font-size:17px;font-weight:800}.auth-architecture-logo{display:grid;width:48px;height:48px;place-items:center;background:#fff;border-radius:14px;box-shadow:0 12px 30px rgba(8,25,40,.2)}.auth-architecture-logo img{width:38px;height:38px;object-fit:contain}
          .auth-architecture-copy{max-width:620px;margin:clamp(44px,9vh,100px) 0}.auth-architecture-kicker,.auth-eyebrow{display:inline-flex;align-items:center;border-radius:999px;font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase}.auth-architecture-kicker{gap:8px;padding:7px 11px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15)}.auth-architecture-copy h1{max-width:600px;margin:18px 0 15px;font-size:clamp(36px,4.5vw,60px);line-height:1.04;letter-spacing:-1.8px}.auth-architecture-copy>p{max-width:520px;color:rgba(255,255,255,.74);font-size:14px;line-height:1.75}
          .auth-architecture-metrics{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;max-width:640px;margin-top:30px}.auth-architecture-metric{min-height:88px;padding:14px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.11);border-radius:14px}.auth-architecture-metric i{margin-bottom:11px;font-size:16px}.auth-architecture-metric b,.auth-architecture-metric span{display:block}.auth-architecture-metric b{font-size:11px}.auth-architecture-metric span{margin-top:4px;color:rgba(255,255,255,.62);font-size:10px;line-height:1.45}.auth-architecture-foot{display:flex;justify-content:space-between;gap:16px;color:rgba(255,255,255,.55);font-size:10px}
          .auth-architecture-formside{position:relative;display:flex;align-items:center;justify-content:center;min-height:100dvh;padding:clamp(24px,5vw,72px);background:#f8fafc}.auth-architecture-formside .auth-container{position:static!important;inset:auto!important;width:min(100%,460px)!important;min-width:0!important;max-width:460px!important;height:auto!important;max-height:none!important;margin:auto!important;padding:34px!important;overflow:visible!important;visibility:visible!important;background:#fff!important;border:1px solid #e3e8ef!important;border-radius:20px!important;box-shadow:0 18px 55px rgba(23,32,51,.09)!important;opacity:1!important;transform:none!important}.auth-architecture-formside .auth-logo,.auth-architecture-formside>.auth-container>h1,.auth-architecture-formside>.auth-container>.auth-sub{display:none!important}
          .auth-architecture-heading{margin-bottom:26px}.auth-brand-inline{gap:9px;margin-bottom:18px}.auth-brand-inline img{width:31px;height:31px;border-radius:9px}.auth-brand-inline span{color:#1e6f9c;font-size:13px;font-weight:800}.auth-eyebrow{padding:5px 9px;margin-bottom:8px;color:#1e6f9c;background:#eaf4fa}.auth-architecture-heading h2{margin:5px 0 8px;color:#172033;font-size:clamp(25px,2.8vw,31px);font-weight:800;line-height:1.15;letter-spacing:-.6px}.auth-architecture-heading p{margin:0;color:#667085;font-size:13px;line-height:1.6}
          .auth-architecture-formside .form-group{margin-bottom:15px}.auth-architecture-formside .form-label{display:block;margin-bottom:7px!important;color:#344054!important;font-size:11px!important;font-weight:700!important}.auth-architecture-formside .form-input,.auth-architecture-formside input,.auth-architecture-formside select{min-height:48px!important;border:1px solid #d0d5dd!important;border-radius:10px!important;background:#fff!important;color:#172033!important;font-size:14px!important;box-shadow:0 1px 2px rgba(16,24,40,.03)!important}.auth-architecture-formside input:focus,.auth-architecture-formside select:focus{border-color:#1e6f9c!important;box-shadow:0 0 0 4px rgba(30,111,156,.1)!important;outline:0!important}.auth-architecture-formside .password-wrap .toggle-password{top:0!important;width:44px!important;height:48px!important;color:#98a2b3!important;transform:none!important}
          .auth-architecture-formside #btnLogin,.auth-architecture-formside #btnRegister,.auth-architecture-formside #btnVerifyOtp{width:100%;min-height:50px!important;margin-top:3px;border:0!important;border-radius:10px!important;background:#1e6f9c!important;box-shadow:0 5px 16px rgba(30,111,156,.22)!important;font-size:14px!important;font-weight:700!important;transition:background .15s ease,box-shadow .15s ease,transform .15s ease!important}.auth-architecture-formside #btnLogin:hover,.auth-architecture-formside #btnRegister:hover,.auth-architecture-formside #btnVerifyOtp:hover{background:#175f87!important;box-shadow:0 8px 22px rgba(30,111,156,.28)!important;transform:translateY(-1px)!important}.auth-architecture-formside button:focus-visible,.auth-architecture-formside a:focus-visible{outline:3px solid rgba(30,111,156,.25);outline-offset:2px}
          .auth-architecture-formside .auth-footer{margin-top:17px;color:#667085;font-size:12px;text-align:center}.auth-architecture-formside .auth-footer a,.auth-architecture-formside .recovery-links a{color:#1e6f9c;font-weight:700;cursor:pointer}.auth-architecture-formside .recovery-links{display:flex;justify-content:space-between;gap:12px;margin:0 0 15px;font-size:11px}.auth-architecture-formside .form-error.show{margin:0 0 13px;padding:10px 12px;color:#b42318;background:#fef3f2;border:1px solid #fecdca;border-radius:9px}.auth-architecture-note{display:flex;align-items:flex-start;gap:9px;padding:11px 13px;margin-top:18px;color:#475467;font-size:10px;line-height:1.55;background:#f2f7fa;border:1px solid #dcebf3;border-radius:10px}.auth-architecture-note i{flex-shrink:0;margin-top:1px;color:#1e6f9c}.auth-register-note{grid-column:1/-1;margin:-2px 0 12px;color:#667085;font-size:10px;line-height:1.55}.auth-hidden-field{display:none!important}
          #authOverlay.auth-architecture[data-auth-mode="register"]{grid-template-columns:minmax(280px,30%) minmax(680px,70%)!important}.auth-architecture[data-auth-mode="register"] .auth-architecture-formside{align-items:flex-start;padding-top:28px;padding-bottom:32px;overflow-y:auto}.auth-architecture[data-auth-mode="register"] .auth-container{width:min(100%,780px)!important;max-width:780px!important}.auth-architecture[data-auth-mode="register"] #registerForm{display:grid!important;grid-template-columns:repeat(2,minmax(0,1fr));column-gap:15px}.auth-architecture[data-auth-mode="register"] #registerForm>.form-row,.auth-architecture[data-auth-mode="register"] #registerForm>#regError,.auth-architecture[data-auth-mode="register"] #registerForm>#btnRegister,.auth-architecture[data-auth-mode="register"] #registerForm>.auth-footer,.auth-architecture[data-auth-mode="register"] #registerForm>.auth-register-note{grid-column:1/-1}
          .auth-architecture[data-auth-mode="otp"] .auth-container{width:min(100%,420px)!important;max-width:420px!important}.otp-destination{padding:11px 13px;margin-bottom:15px;color:#475467;font-size:11px;line-height:1.55;text-align:center;background:#f8fafc;border:1px solid #e4e7ec;border-radius:10px}.otp-destination strong{display:block;margin-top:3px;color:#1e6f9c;font-size:12px;word-break:break-word}#otpCode.otp-code-input{height:58px!important;padding:0 14px!important;color:#172033;font-size:23px!important;font-weight:800;letter-spacing:clamp(8px,2vw,13px);text-align:center;font-variant-numeric:tabular-nums;caret-color:#1e6f9c}#otpCode.otp-code-input::placeholder{color:#d0d5dd;font-size:18px;letter-spacing:5px}
          @media(max-width:900px){#authOverlay.auth-architecture,#authOverlay.auth-architecture[data-auth-mode="register"]{display:flex!important;flex-direction:column!important;min-height:100dvh!important;padding:0!important;overflow-y:auto!important;background:#f6f8fb!important}.auth-architecture-story{min-height:auto;flex-shrink:0;padding:22px 20px 70px;background:#163b59}.auth-architecture-brand{font-size:15px}.auth-architecture-logo{width:42px;height:42px}.auth-architecture-copy{margin:20px 0 0}.auth-architecture-copy h1{margin:10px 0 7px;font-size:25px;line-height:1.12;letter-spacing:-.7px}.auth-architecture-copy>p,.auth-architecture-metrics,.auth-architecture-foot{display:none}.auth-architecture-formside,.auth-architecture[data-auth-mode="register"] .auth-architecture-formside{align-items:stretch;justify-content:flex-start;min-height:0;padding:0 16px 34px;margin-top:-34px;overflow:visible;background:transparent}.auth-architecture-formside .auth-container{width:100%!important;max-width:620px!important;padding:26px 23px!important;margin:0 auto!important;border-radius:18px!important;box-shadow:0 12px 36px rgba(23,32,51,.11)!important}.auth-architecture[data-auth-mode="register"] #registerForm{grid-template-columns:1fr!important}.auth-architecture[data-auth-mode="register"] #registerForm>*{grid-column:1!important}}
          @media(max-width:520px){.auth-architecture-story{padding:15px 15px 64px}.auth-architecture-copy{margin-top:16px}.auth-architecture-copy h1{font-size:21px}.auth-architecture-kicker{padding:5px 8px;font-size:9px}.auth-architecture-formside,.auth-architecture[data-auth-mode="register"] .auth-architecture-formside{padding:0 11px calc(28px + env(safe-area-inset-bottom,0px));margin-top:-30px}.auth-architecture-formside .auth-container{padding:22px 17px!important;border-radius:16px!important}.auth-architecture-heading{margin-bottom:20px}.auth-architecture-heading h2{font-size:21px}.auth-architecture-formside .form-input,.auth-architecture-formside input,.auth-architecture-formside select{min-height:47px!important}#otpCode.otp-code-input{height:55px!important;font-size:21px!important;letter-spacing:8px}}

'''
          if start not in s or end not in s: raise SystemExit('auth style markers missing')
          before, rest=s.split(start,1)
          old, after=rest.split(end,1)
          s=before+css+end+after
          s=re.sub(r'@media\(max-width:1100px\)\{#authOverlay\.auth-architecture.*?(?=@media\(max-width:820px\))','',s,flags=re.S)
          s=re.sub(r'@media\(max-width:820px\)\{#authOverlay\.auth-architecture.*?(?=@media\(max-width:520px\))','@media(max-width:820px){.report-unified-grid{grid-template-columns:1fr}.report-unified-checks{max-height:none}}',s,flags=re.S)
          s=re.sub(r'@media\(max-width:520px\)\{#authOverlay\.auth-architecture.*?(?=@media print)','@media(max-width:520px){.report-unified-hero{padding:20px}.report-unified-hero h2{font-size:20px}.report-unified-checks{grid-template-columns:1fr}.report-unified-bar{align-items:stretch;flex-direction:column}.report-unified-bar .btn{width:100%}}',s,flags=re.S)
          p.write_text(s,encoding='utf-8')
          PY
      - name: Validate structure
        run: |
          python - <<'PY'
          from pathlib import Path
          s=Path('index.html').read_text()
          assert s.count('AUTHENTICATION — CLEAN MODERN UI') == 1
          assert 'AUTHENTICATION — LOGIN, REGISTRATION, AND OTP' not in s
          assert s.count('#authOverlay.auth-architecture.hidden') == 1
          for x in ['loginForm','registerForm','otpForm','btnLogin','btnRegister','btnVerifyOtp','loginUsername','loginPassword','otpCode']:
              assert f'id="{x}"' in s, x
          assert s.count('<style') == s.count('</style>')
          assert s.count('<div') == s.count('</div>')
          PY
          node --check app.js
      - name: Commit redesign
        run: |
          rm -f .github/workflows/apply-auth-redesign.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add index.html .github/workflows/apply-auth-redesign.yml
          git commit -m "redesign: simplify authentication experience"
          git push origin HEAD:agent/redesign-auth-ui
