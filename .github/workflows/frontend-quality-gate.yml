name: Frontend quality gate

on:
  push:
    branches: [main]
    paths: ['app.js','sw.js','_worker.js','index.html','.github/workflows/frontend-quality-gate.yml']
  pull_request:
    paths: ['app.js','sw.js','_worker.js','index.html','.github/workflows/frontend-quality-gate.yml']

concurrency:
  group: frontend-quality-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Validate JavaScript syntax
        run: |
          node --check app.js
          node --check sw.js
          node --check _worker.js
      - name: Reject unresolved merge markers
        run: |
          if grep -RInE '^(<<<<<<<|=======|>>>>>>>)' -- app.js sw.js _worker.js index.html; then exit 1; fi
      - name: Validate canonical runtime
        run: |
          grep -Fq "var API_BASE_URL" app.js
          grep -Fq "var API_ROUTES" app.js
          grep -Fq "Fungsi API tidak terdaftar" app.js
          grep -Fq "function loadApprovalData()" app.js
          grep -Fq "if (!currentUser || approvalLoadState.inFlight) return;" app.js
          grep -Fq "var filters = { kategori: 'PENGELUARAN' };" app.js
          grep -Fq "var normalizedResponse = normalizeApprovalApiResponse(result);" app.js
          grep -Fq "Approval render failure:" app.js
          grep -Fq "20260723-login-mobile-spacing-v20" _worker.js
          grep -Fq "sim-sppg-v20260723-login-mobile-spacing-v19" sw.js
          grep -Fq "pageKey()==='approval'" app.js
          if grep -Fq 'class="auth-card-brand"' index.html; then exit 1; fi
          grep -Fq "margin-top: -14px;" index.html
          test "$(grep -Fc 'function loadApprovalData()' app.js)" -eq 1
          if grep -Fq "var filters = { kategori: 'PENGELUARAN', approvalOnly: true };" app.js; then exit 1; fi
          if grep -Fq 'function runQueuedApprovalReload()' app.js; then exit 1; fi
          if grep -Fq 'approvalRuntime' _worker.js; then exit 1; fi
          if grep -Fq '<script src="./approval-transaction-loader.js' _worker.js; then exit 1; fi
          if grep -Fq 'networkFirstAppWithCompatibility' sw.js; then exit 1; fi
      - name: Validate pagination integrations
        run: |
          for token in txServerPaged usersServerPaged bbServerPaged supplierServerPaged surveiServerPaged stServerPaged menuServerPaged pendingServerPaged auditServerPaged notifServerPaged; do
            grep -Fq "$token" app.js || exit 1
          done
      - name: Check accidental credential literals
        run: |
          python - <<'PY'
          from pathlib import Path
          import re, sys
          files=[Path('app.js'),Path('sw.js'),Path('_worker.js'),Path('index.html')]
          p=re.compile(r"(?:service_role|SUPABASE_SERVICE_ROLE_KEY)\s*[:=]\s*['\"]([A-Za-z0-9._-]{20,})['\"]",re.I)
          findings=[]
          for f in files:
              t=f.read_text(encoding='utf-8',errors='replace')
              findings += [f'{f}:{t.count(chr(10),0,m.start())+1}' for m in p.finditer(t)]
          if findings:
              print('\n'.join(findings),file=sys.stderr); sys.exit(1)
          PY
      - name: Summary
        run: echo 'Frontend canonical Approval source checks passed.'
