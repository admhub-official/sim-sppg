name: Apply approval row detail UI

on:
  push:
    branches:
      - feat/approval-clickable-detail
    paths:
      - 'scripts/apply-approval-row-detail.py'
      - '.github/workflows/apply-approval-row-detail.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/approval-clickable-detail
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply clickable Approval detail patch
        run: python scripts/apply-approval-row-detail.py
      - name: Commit generated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.js index.html sw.js scripts/check-verifier-flow-regression.mjs
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "feat: make approval rows open actionable detail"
            git push origin HEAD:feat/approval-clickable-detail
          fi
