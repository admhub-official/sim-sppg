name: Apply master and registration routing

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-master-registration-routing.yml'
      - 'scripts/apply-master-registration-routing.py'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply routing patch
        run: python scripts/apply-master-registration-routing.py
      - name: Commit changes
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add app.js
          git diff --cached --quiet && exit 0
          git commit -m "feat: route master data and registration to hardened backends"
          git push