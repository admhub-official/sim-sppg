name: Route reporting-action

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/scripts/route-reporting-action.py'
      - '.github/workflows/route-reporting-action.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch app.js
        run: python .github/scripts/route-reporting-action.py
      - name: Validate routing
        run: |
          set -euo pipefail
          grep -q "reporting-action" app.js
          grep -q "REPORTING_FN" app.js
          grep -q "getNotifications:1" app.js
      - name: Commit app.js
        run: |
          set -euo pipefail
          if git diff --quiet -- app.js; then
            echo 'No routing changes required.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add app.js
          git commit -m 'feat: route reporting to hardened backend'
          git push
