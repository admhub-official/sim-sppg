name: Supabase Auto Migrate
on:
  push:
    branches: [main]
    paths: ['supabase/migrations/**']
permissions:
  contents: read
concurrency:
  group: supabase-production-deploy
  cancel-in-progress: false
jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Apply migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_DB_PASSWORD"
          supabase link --project-ref dmjsgtichrfxhyywstrt --password "$SUPABASE_DB_PASSWORD"
          supabase db push --linked --include-all --password "$SUPABASE_DB_PASSWORD"
