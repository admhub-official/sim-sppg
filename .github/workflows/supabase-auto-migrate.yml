name: Supabase Auto Migrate
on:
  push:
    branches: [main]
    paths: ['supabase/migrations/**']
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: supabase-production-deploy
  cancel-in-progress: false
jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Validate Supabase access token
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${SUPABASE_ACCESS_TOKEN:-}" ]]; then
            echo "SUPABASE_ACCESS_TOKEN is not configured." >&2
            exit 1
          fi
      - name: Apply migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${SUPABASE_DB_PASSWORD:-}" ]]; then
            echo "::warning title=Migration skipped::SUPABASE_DB_PASSWORD is not configured. Edge Function deployment is unaffected; database migrations were not applied by this workflow."
            {
              echo "## Supabase migration skipped"
              echo
              echo "Repository secret \`SUPABASE_DB_PASSWORD\` is not configured."
              echo "No database command was executed. Configure the secret and re-run this workflow to enable automatic migration deployment."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          supabase link --project-ref dmjsgtichrfxhyywstrt --password "$SUPABASE_DB_PASSWORD"
          supabase db push --linked --include-all --password "$SUPABASE_DB_PASSWORD"
