name: Dedupe Approval loader

on:
  push:
    branches:
      - fix/approval-loading-loop-cleanup
    paths:
      - 'scripts/dedupe-approval-loader.py'
      - '.github/workflows/dedupe-approval-loader.yml'

permissions:
  contents: write

jobs:
  dedupe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/approval-loading-loop-cleanup
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Replace duplicated lifecycle helpers
        run: python scripts/dedupe-approval-loader.py
      - name: Validate canonical loader
        run: |
          node --check app.js
          node scripts/check-approval-row-detail.mjs
          node scripts/check-verifier-flow-regression.mjs
          node --check _worker.js
      - name: Commit cleaned loader
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.js
          git commit -m "refactor: deduplicate Approval loader helpers"
          git push origin HEAD:fix/approval-loading-loop-cleanup
