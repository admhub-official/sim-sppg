name: Run payment-aware transaction edit patch
on:
  pull_request:
    branches: [main]
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/payment-aware-transaction-edit-20260720
          fetch-depth: 0
      - run: |
          python scripts/patch-payment-aware-edit.py
          grep -Fq 'Nominal transaksi tidak boleh lebih kecil dari pembayaran yang sudah diajukan.' supabase/functions/transaction-action/index.ts
          ! grep -Fq 'Transaksi yang sudah dibayar tidak dapat diedit.' supabase/functions/transaction-action/index.ts
      - run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add supabase/functions/transaction-action/index.ts
          git commit -m 'fix: make transaction edits payment-ledger aware'
          git push origin HEAD:fix/payment-aware-transaction-edit-20260720
