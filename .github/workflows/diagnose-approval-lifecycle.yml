name: Diagnose Approval lifecycle

on:
  push:
    branches:
      - fix/approval-loading-loop-cleanup
    paths:
      - '.github/workflows/diagnose-approval-lifecycle.yml'

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/approval-loading-loop-cleanup
          fetch-depth: 0
      - name: Capture focused output
        run: |
          node scripts/check-approval-row-detail.mjs > diag-approval-lifecycle.txt 2>&1 || true
          node --check app.js >> diag-approval-lifecycle.txt 2>&1 || true
          node --check _worker.js >> diag-approval-lifecycle.txt 2>&1 || true
      - name: Commit diagnostic
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add diag-approval-lifecycle.txt
          git commit -m "chore: capture Approval lifecycle diagnostic"
          git push origin HEAD:fix/approval-loading-loop-cleanup
