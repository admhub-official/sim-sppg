name: Apply Approval responsive UI v2

on:
  push:
    branches:
      - fix/approval-responsive-ui-cleanup
    paths:
      - 'scripts/apply-approval-responsive-ui-v2.py'
      - '.github/workflows/apply-approval-responsive-ui-v2.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/approval-responsive-ui-cleanup
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply responsive Approval desktop and mobile UI
        run: python scripts/apply-approval-responsive-ui-v2.py
      - name: Commit generated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.js index.html sw.js scripts/check-approval-row-detail.mjs scripts/check-verifier-flow-regression.mjs
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "fix: redesign Approval for desktop and mobile"
            git push origin HEAD:fix/approval-responsive-ui-cleanup
          fi
