name: Security smoke tests

on:
  workflow_dispatch:
  schedule:
    - cron: '17 2 * * *'
  push:
    branches: [main]
    paths:
      - 'scripts/security-smoke-test.mjs'
      - '.github/workflows/security-smoke-tests.yml'
      - 'supabase/functions/transaction-action/**'
      - 'supabase/functions/file-access-action/**'
      - 'supabase/functions/operations-action/**'
      - 'supabase/functions/reporting-action/**'
      - 'supabase/functions/master-action/**'

permissions:
  contents: read

concurrency:
  group: security-smoke-production
  cancel-in-progress: false

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUPABASE_URL: https://dmjsgtichrfxhyywstrt.supabase.co
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      TEST_USER_EMAIL: ${{ secrets.SECURITY_TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.SECURITY_TEST_USER_PASSWORD }}
      TEST_ADMIN_EMAIL: ${{ secrets.SECURITY_TEST_ADMIN_EMAIL }}
      TEST_ADMIN_PASSWORD: ${{ secrets.SECURITY_TEST_ADMIN_PASSWORD }}
      TEST_ADMIN_SPPG: ${{ secrets.SECURITY_TEST_ADMIN_SPPG }}
      TEST_ADMIN_YAYASAN: ${{ secrets.SECURITY_TEST_ADMIN_YAYASAN }}

    steps:
      - uses: actions/checkout@v4

      - name: Detect configured security fixtures
        id: fixtures
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          for key in SUPABASE_ANON_KEY TEST_USER_EMAIL TEST_USER_PASSWORD TEST_ADMIN_EMAIL TEST_ADMIN_PASSWORD TEST_ADMIN_SPPG TEST_ADMIN_YAYASAN; do
            if [ -z "${!key:-}" ]; then missing+=("$key"); fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Security smoke tests skipped: fixture secrets are not configured." >> "$GITHUB_STEP_SUMMARY"
            printf 'Missing: `%s`\n' "${missing[*]}" >> "$GITHUB_STEP_SUMMARY"
            echo "Configure repository Actions secrets to enable production authorization tests." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "Security fixture secrets detected; tests will run." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Run production-safe authorization tests
        if: steps.fixtures.outputs.ready == 'true'
        run: node scripts/security-smoke-test.mjs

      - name: Report skipped tests
        if: steps.fixtures.outputs.ready != 'true'
        run: echo 'Skipped safely because the required test-account secrets are not configured.'
