name: Apply Approval missing-document cleanup

on:
  push:
    branches: [main]
    paths:
      - 'scripts/apply-hide-missing-approval-docs.py'
      - '.github/workflows/apply-hide-missing-approval-docs.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Hide empty document cards in Approval detail
        run: python scripts/apply-hide-missing-approval-docs.py

      - name: Validate Approval detail flow
        run: |
          node scripts/check-approval-row-detail.mjs
          git diff --check

      - name: Commit generated frontend update
        shell: bash
        run: |
          if git diff --quiet; then
            echo 'Frontend already up to date.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add app.js index.html sw.js _worker.js
          git commit -m 'Hide missing document cards in Approval detail'
          git push
