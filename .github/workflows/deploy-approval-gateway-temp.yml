name: Deploy approval gateway temporary
on:
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy protected functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN"
          supabase functions deploy approval-payment-action --project-ref dmjsgtichrfxhyywstrt
          supabase functions deploy reporting-action --project-ref dmjsgtichrfxhyywstrt
